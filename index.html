// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function sdg(id,spd){return(ST[id]||{})[spd]||null;}
function p2(n){return String(n).padStart(2,"0");}
function ft(d){if(!d||isNaN(new Date(d).getTime()))return"--";const x=new Date(d);return x.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}
function fdt(d){if(!d)return"--";const x=new Date(d);if(isNaN(x.getTime()))return"--";return x.toLocaleDateString("en-ZA",{day:"2-digit",month:"short"})+" "+x.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}
function fd(d){if(!d)return"Not set";return new Date(d).toLocaleDateString("en-ZA",{day:"2-digit",month:"short",year:"numeric"});}
function gdap(id){const pd=PD[id];if(!pd)return null;return Math.floor((Date.now()-new Date(pd).getTime())/86400000);}
function pst(st){
  if(!st)return null;
  let d=new Date(st);
  if(isNaN(d.getTime()))d=new Date(st.replace("T"," "));
  if(isNaN(d.getTime())&&st.length===16)d=new Date(st+":00");
  return isNaN(d.getTime())?null:d;
}
function cp(p){
  if(!p.active||!p.startTime)return null;
  const s=sdg(p.id,p.speed);if(!s)return null;
  const frac=MF[p.mode]||1;
  // TIME uses fraction, but mm/rev is the FULL value regardless of mode
  const totalHrs=s.hrs*frac;
  const sd=pst(p.startTime);if(!sd)return null;
  const el=(Date.now()-sd.getTime())/3600000;
  if(isNaN(el)||el<0)return null;
  const pct=Math.min(100,(el/totalHrs)*100);
  const mmNow=s.mm*(pct/100); // mm applied so far (full mm/rev * progress)
  return{pct,el,totalHrs,rem:Math.max(0,totalHrs-el),finish:new Date(sd.getTime()+totalHrs*3600000),mm:s.mm,mmNow,frac};
}
function gsl(id){
  const sp=S.chemRecs.filter(r=>r.pivot===id&&r.sprayTime);
  if(!sp.length)return null;
  const lt=sp.sort((a,b)=>new Date(b.sprayTime)-new Date(a.sprayTime))[0];
  const el=(Date.now()-new Date(lt.sprayTime).getTime())/3600000;
  return el<24?{h:(24-el).toFixed(1)}:null;
}
function gfw(id){
  const p=S.fertRecs.filter(r=>r.pivot===id&&r.needsIrrigation&&!r.irrigated);
  return p.length?p[p.length-1]:null;
}
function lh(pivot,action,detail){S.historyLog.unshift({id:"h"+Date.now(),timestamp:new Date().toISOString(),pivot,action,detail});}
function getSeason(){const m=new Date().getMonth();return m>=3&&m<=8?"Autumn/Winter":"Spring/Summer";}

// ═══════════════════════════════════════════════════════
// SVG CIRCLE DRAWING
// ═══════════════════════════════════════════════════════
function dc(id,pct,mode,sz,active,warn){
  const cx=sz/2,cy=sz/2,r=sz*0.37,sw=sz*0.12;
  const circ=2*Math.PI*r,frac=MF[mode]||1,rot=MR[mode]!=null?MR[mode]:-90;
  const safePct=Math.max(0,Math.min(100,pct));
  const ta=circ*frac,fa=ta*(safePct/100);
  const tc=warn?"#7f1d1d":"#1e3a2f",rc=warn?"#450a0a":"#2d5a3d",fc=warn?"#f87171":"#4ade80",dc2=active?(warn?"#f87171":"#4ade80"):"#374151";
  let divs="";
  const dr=r+sw/2;
  if(mode.includes("Eighth")){
    divs=Array.from({length:8},(_,i)=>{const a=(i*45-90)*Math.PI/180;return`<line x1="${cx.toFixed(1)}" y1="${cy.toFixed(1)}" x2="${(cx+dr*Math.cos(a)).toFixed(1)}" y2="${(cy+dr*Math.sin(a)).toFixed(1)}" stroke="#1e3a2f" stroke-width="0.8" stroke-dasharray="2,2"/>`;}).join("");
  } else if(mode.includes("Quarter")){
    divs=`<line x1="${cx.toFixed(1)}" y1="${(cy-dr).toFixed(1)}" x2="${cx.toFixed(1)}" y2="${(cy+dr).toFixed(1)}" stroke="#1e3a2f" stroke-width="0.8" stroke-dasharray="2,2"/><line x1="${(cx-dr).toFixed(1)}" y1="${cy.toFixed(1)}" x2="${(cx+dr).toFixed(1)}" y2="${cy.toFixed(1)}" stroke="#1e3a2f" stroke-width="0.8" stroke-dasharray="2,2"/>`;
  } else if(mode==="Top Side"||mode==="Bottom Side"){
    divs=`<line x1="${(cx-dr).toFixed(1)}" y1="${cy.toFixed(1)}" x2="${(cx+dr).toFixed(1)}" y2="${cy.toFixed(1)}" stroke="#1e3a2f" stroke-width="0.8" stroke-dasharray="2,2"/>`;
  }
  let arm="";
  if(active){const angle=(rot+(safePct/100)*frac*360)*Math.PI/180;arm=`<line x1="${cx.toFixed(1)}" y1="${cy.toFixed(1)}" x2="${(cx+r*Math.cos(angle)).toFixed(1)}" y2="${(cy+r*Math.sin(angle)).toFixed(1)}" stroke="#facc15" stroke-width="${(sz*0.04).toFixed(1)}" stroke-linecap="round"/>`;}
  const abbr=MA[mode]||"";
  return`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${tc}" stroke-width="${sw}"/>${divs}${active?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${rc}" stroke-width="${sw}" stroke-dasharray="${ta.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round" transform="rotate(${rot} ${cx} ${cy})"/>`:""}${active?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${fc}" stroke-width="${sw}" stroke-dasharray="${fa.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round" transform="rotate(${rot} ${cx} ${cy})"/>`:""}${arm}<circle cx="${cx}" cy="${cy}" r="${(sz*0.06).toFixed(1)}" fill="${dc2}"/>${mode!=="Full Circle"?`<text x="${cx}" y="${(cy+sz*0.06).toFixed(1)}" text-anchor="middle" fill="#4b5563" font-size="${(sz*0.13).toFixed(1)}" font-family="Arial">${abbr}</text>`:""}</svg>`;
}

    const plantD=PD[p.id];const dap2=gdap(p.id);
    const ph=(S.plantingHistory[p.id]||[]);
    body=`<div class="card" style="margin-bottom:12px;">

      </div>
      ${p.id==="P4"?`<div style="font-size:11px;color:#fb923c;margin-top:6px;">⚠ P4 Top planted 06 May · Bottom planted 29 May</div>`:""}
    </div>
    <button class="btn btn-green" onclick="openSetPlantDate('${p.id}')">📅 Set / Change Planting Date</button>
    <button class="btn btn-orange" onclick="openResetDap('${p.id}')">🔄 Reset DAP (New Crop)</button>

  document.getElementById("pg-detail").innerHTML=`

// START / STOP IRRIGATION
// ═══════════════════════════════════════════════════════
function openStartModal(pivotId){
  const now=new Date();
  S.pendingStart={pivotId,mode:"Full Circle",speed:50,startTime:now.toISOString().slice(0,16)};
  showStartModal();
}
function openStartFromTable(pivotId,speed){
  const now=new Date();
  S.pendingStart={pivotId,mode:"Full Circle",speed,startTime:now.toISOString().slice(0,16)};
  showStartModal();
}
function showStartModal(){
  const f=S.pendingStart;if(!f)return;
  const s=sdg(f.pivotId,f.speed)||{mm:0,hrs:0};
  const frac=MF[f.mode]||1;
  const totalHrs=(s.hrs*frac).toFixed(1);
  const totalMm=s.mm.toFixed(1);
  const pivOpts=PN.map(p=>`<option value="${p}"${p===f.pivotId?" selected":""}>${p}</option>`).join("");
  const spdOpts=SP.map(s=>`<option value="${s}"${s===f.speed?" selected":""}>${s}%</option>`).join("");
  const modeOpts=AM.map(m=>`<option value="${m}"${m===f.mode?" selected":""}>${m}</option>`).join("");
  document.getElementById("modalContent").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><div style="font-size:18px;font-weight:800;color:#e5e7eb;">▶ Start Irrigation</div><button onclick="closeModal()" style="background:#1e3a2f;border:none;color:#9ca3af;border-radius:8px;padding:6px 14px;">✕</button></div>
    <div class="card" style="margin-bottom:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div style="text-align:center;"><div style="font-size:18px;font-weight:800;color:#4ade80;">${totalMm} mm</div><div style="font-size:10px;color:#6b7280;">mm / rev</div></div>
      <div style="text-align:center;"><div style="font-size:18px;font-weight:800;color:#60a5fa;">${totalHrs} hrs</div><div style="font-size:10px;color:#6b7280;">total runtime</div></div>
    </div>
    <div class="il">Pivot</div><select class="if" onchange="S.pendingStart.pivotId=this.value;showStartModal();">${pivOpts}</select>
    <div class="il">Speed</div><select class="if" onchange="S.pendingStart.speed=parseInt(this.value);showStartModal();">${spdOpts}</select>
    <div class="il">Mode</div><select class="if" onchange="S.pendingStart.mode=this.value;showStartModal();">${modeOpts}</select>
    <div class="il">Start Date & Time</div><input type="datetime-local" class="ib" value="${f.startTime}" onchange="S.pendingStart.startTime=this.value;"/>
    <button class="btn btn-green" onclick="doStart()">▶ Start Now</button>`;
  document.getElementById("mainModal").classList.add("open");
}
function doStart(){
  const f=S.pendingStart;if(!f)return;
  S.pivots=S.pivots.map(p=>p.id===f.pivotId?{...p,active:true,startTime:f.startTime,stopTime:null,speed:f.speed,mode:f.mode}:p);
  lh(f.pivotId,"Irrigation Started",`${f.mode} · ${f.speed}% · ${fdt(f.startTime)}`);
  closeModal();save();
  if(S.page==="detail")rDetail();
  rDash();
}
function doStop(id){
  const p=S.pivots.find(x=>x.id===id);
  if(!p)return;
  const pr=cp(p);
  // Save to irrigation history — use FULL mm/rev value, only time is fractional
  if(pr&&pr.pct>0&&pr.mmNow>0&&pr.el>0){
    if(!S.irrigHistory[id])S.irrigHistory[id]=[];
    const ha=HA[id]||0;
    const mmApp=Math.max(0,pr.mmNow).toFixed(1);
    const m3=Math.max(0,pr.mmNow*ha*10).toFixed(0);
    const nowISO=new Date().toISOString();
    S.irrigHistory[id].unshift({
      id:"ih"+Date.now(),
      startTime:p.startTime,
      stopTime:nowISO,
      mode:p.mode,speed:p.speed,
      mmApplied:mmApp,m3,
      pctComplete:pr.pct.toFixed(1),
      season:getSeason()
    });
  }
  lh(id,"Irrigation Stopped",`${p.mode} · ${p.speed}% · ${pr?pr.pct.toFixed(1)+"% complete":"stopped"}`);
  S.pivots=S.pivots.map(x=>x.id===id?{...x,active:false,stopTime:new Date().toISOString()}:x);
  save();
  if(S.page==="detail")rDetail();
  rDash();
}

    <button class="btn btn-red" onclick="deleteTask('${taskId}')">🗑 Delete Task</button>`;

}
function saveSched(taskId){
  const pivot=document.getElementById("sc_pivot").value;
  const day=document.getElementById("sc_day").value;
  const type=document.getElementById("sc_type").value;
  const product=document.getElementById("sc_prod").value.trim();
  const side=document.getElementById("sc_side").value;
  const note=document.getElementById("sc_note").value;
  if(!product){alert("Enter product/description");return;}
  if(taskId){
    S.schedule=S.schedule.map(t=>t.id===taskId?{...t,pivot,day,type,product,side,note}:t);
  } else {
    S.schedule.push({id:"s"+Date.now(),pivot,day,type,product,side,note,done:false});
  }
  closeModal();save();
  if(S.page==="planner")rPlanner();
  if(S.page==="detail")rDetail();
  if(S.page==="calendar")rCal();
}
function deleteTask(taskId){
  if(!confirm("Delete this task?"))return;
  S.schedule=S.schedule.filter(t=>t.id!==taskId);
  closeModal();save();
  if(S.page==="planner")rPlanner();
  if(S.page==="detail")rDetail();
  if(S.page==="calendar")rCal();
}
function toggleDone(taskId){
  S.schedule=S.schedule.map(t=>t.id===taskId?{...t,done:!t.done}:t);
  save();
  if(S.page==="planner")rPlanner();
  if(S.page==="calendar")rCal();
}

      <div style="display:flex;gap:4px;"><button onclick="toggleDone('${t.id}');rCal();" style="background:${t.done?"#2d5a3d":"#0a1a10"};border:1px solid ${t.done?"#4ade80":"#1e3a2f"};color:${t.done?"#4ade80":"#6b7280"};border-radius:6px;padding:4px 8px;font-size:10px;">${t.done?"✓":"Done"}</button><button onclick="openSchedModal('${t.id}')" style="background:#0a1a10;border:1px solid #1e3a2f;color:#a78bfa;border-radius:6px;padding:4px 7px;font-size:10px;">✏️</button></div>

  document.getElementById("pg-calendar").innerHTML=`<div style="font-size:11px;color:#4ade80;font-weight:700;margin-bottom:8px;">WEEKLY OVERVIEW</div>${grid}${dayDetail}`;
}

// ═══════════════════════════════════════════════════════
// AUTO-START SCHEDULED IRRIGATIONS
// ═══════════════════════════════════════════════════════
function checkAutoStart(){
  const now=Date.now();
  S.preScheduled.filter(s=>!s.started&&s.scheduledTime).forEach(s=>{
    const t=new Date(s.scheduledTime).getTime();
    if(!isNaN(t)&&t<=now&&now-t<300000){
      const piv=S.pivots.find(p=>p.id===s.pivot);
      if(piv&&!piv.active){
        S.pivots=S.pivots.map(p=>p.id===s.pivot?{...p,active:true,startTime:s.scheduledTime,stopTime:null,speed:s.speed,mode:s.mode}:p);
        s.started=true;
        lh(s.pivot,'Auto-Started',`Scheduled: ${s.mode} · ${s.speed}%`);
        save();rDash();
        if(S.page==='detail'&&S.selPivot===s.pivot)rDetail();
      }
    }
  });
}

function openResetDap(id){
  document.getElementById("modalContent").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><div style="font-size:18px;font-weight:800;color:#e5e7eb;">🔄 Reset DAP — ${id}</div><button onclick="closeModal()" style="background:#1e3a2f;border:none;color:#9ca3af;border-radius:8px;padding:6px 14px;">✕</button></div>
    <div class="card" style="margin-bottom:12px;"><div style="font-size:13px;color:#fb923c;">This will archive the current planting and reset DAP to 0 for a new crop.</div></div>
    <div class="il">New Planting Date</div><input type="date" class="ib" id="rd_date" value="${new Date().toISOString().slice(0,10)}"/>
    <div class="il">Notes</div><input type="text" class="ib" id="rd_note" placeholder="Season / variety notes"/>
    <button class="btn btn-orange" onclick="doResetDap('${id}')">Reset DAP (New Crop)</button>`;
  document.getElementById("mainModal").classList.add("open");
}
function doResetDap(id){
  if(!S.plantingHistory[id])S.plantingHistory[id]=[];
  S.plantingHistory[id].unshift({plantedAt:PD[id],resetAt:new Date().toISOString(),notes:document.getElementById("rd_note").value});
  PD[id]=document.getElementById("rd_date").value;
  closeModal();save();rDetail();
}

// ═══════════════════════════════════════════════════════
// HISTORY PAGE
// ═══════════════════════════════════════════════════════
function rHistory(){
  const tabs=[["log","📜 Log"],["planting","🌱 Planting"],["backup","💾 Backup"]];
  const tabBar=`<div class="tab-bar">${tabs.map(([t,l])=>`<button class="tab-btn${S.histTab===t?" on":""}" onclick="S.histTab='${t}';rHistory();">${l}</button>`).join("")}</div>`;
  let body="";
  if(S.histTab==="log"){
    body=S.historyLog.length?S.historyLog.slice(0,50).map(h=>`<div class="card" style="margin-bottom:6px;"><div style="display:flex;justify-content:space-between;"><span style="font-size:11px;font-weight:700;color:#4ade80;">${h.pivot||"—"}</span><span style="font-size:10px;color:#6b7280;">${fdt(h.timestamp)}</span></div><div style="font-size:11px;color:#e5e7eb;">${h.action}</div><div style="font-size:10px;color:#9ca3af;">${h.detail||""}</div></div>`).join(""):`<div style="color:#6b7280;text-align:center;padding:24px;">No activity yet</div>`;
  } else if(S.histTab==="planting"){
    body=PN.map(id=>{
      const ph=S.plantingHistory[id]||[];
      if(!ph.length)return"";
      return`<div style="margin-bottom:12px;"><div style="font-size:11px;font-weight:700;color:#4ade80;margin-bottom:6px;">${id}</div>${ph.map(h=>`<div class="card"><div style="font-size:12px;color:#9ca3af;">Planted: ${fd(h.plantedAt)} → Reset: ${h.resetAt?fd(h.resetAt):"current"}</div>${h.notes?`<div style="font-size:11px;color:#6b7280;">${h.notes}</div>`:""}</div>`).join("")}</div>`;
    }).join("")||`<div style="color:#6b7280;text-align:center;padding:24px;">No planting history yet</div>`;
  } else {
    body=`<div class="card" style="margin-bottom:12px;"><div style="font-size:13px;color:#e5e7eb;margin-bottom:4px;">Export / Import all farm data</div><div style="font-size:11px;color:#6b7280;">Use this to backup your data or transfer to a new version of the app.</div></div>
    <button class="btn btn-green" onclick="exportData()">📤 Export Data (Backup)</button>
    <button class="btn btn-blue" onclick="importData()">📥 Import Data (Restore)</button>`;
  }
  document.getElementById("pg-history").innerHTML=tabBar+body;
}

// ═══════════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════════
function exportData(){
  const obj={version:3,exportedAt:new Date().toISOString(),pivots:S.pivots,fertRecs:S.fertRecs,chemRecs:S.chemRecs,schedule:S.schedule,dayNotes:S.dayNotes,preScheduled:S.preScheduled,plantingHistory:S.plantingHistory,irrigHistory:S.irrigHistory,historyLog:S.historyLog,plantDates:PD};
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="WakaWaka_backup_"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(url);
}
function importData(){
  const input=document.createElement("input");input.type="file";input.accept=".json";
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.version&&d.pivots){
          if(d.pivots)S.pivots=d.pivots;
          if(d.fertRecs)S.fertRecs=d.fertRecs;
          if(d.chemRecs)S.chemRecs=d.chemRecs;
          if(d.schedule)S.schedule=d.schedule;
          if(d.dayNotes)S.dayNotes=d.dayNotes;
          if(d.preScheduled)S.preScheduled=d.preScheduled;
          if(d.plantingHistory)S.plantingHistory=d.plantingHistory;
          if(d.irrigHistory)S.irrigHistory=d.irrigHistory;
          if(d.historyLog)S.historyLog=d.historyLog;
          if(d.plantDates)Object.assign(PD,d.plantDates);
          save();rDash();
          alert("✅ Data imported successfully!");
        } else {alert("❌ Invalid backup file");}
      }catch(err){alert("❌ Could not read file: "+err.message);}
    };
    reader.readAsText(file);
  };
  input.click();
}

// ═══════════════════════════════════════════════════════
// MODAL HELPERS

function closeModal(){document.getElementById("mainModal").classList.remove("open");}
function closeWarn(){document.getElementById("warnModal").classList.remove("open");}
function showWarn(msg){document.getElementById("warnContent").innerHTML=`<div style="font-size:16px;font-weight:700;color:#f87171;margin-bottom:12px;">⚠ Warning</div><div style="font-size:13px;color:#e5e7eb;margin-bottom:16px;">${msg}</div><button class="btn btn-red" onclick="closeWarn()">OK</button>`;document.getElementById("warnModal").classList.add("open");}

setInterval(()=>{checkAutoStart();
  checkAutoStart();

},60000);
rDash();
