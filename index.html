<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Waka Waka Pivot Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#070f09;color:#e5e7eb;font-family:'Trebuchet MS',Arial,sans-serif;overscroll-behavior:none;}
input,select,textarea{outline:none;-webkit-appearance:none;appearance:none;font-family:inherit;}
button{-webkit-appearance:none;appearance:none;font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{display:none;}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;}
.page{padding:16px 16px 100px;display:none;}
.page.active{display:block;}
.header{position:sticky;top:0;z-index:50;background:#070f09;border-bottom:1px solid #1e3a2f;padding:14px 20px 12px;}
.header-row{display:flex;align-items:center;gap:10;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10;margin-bottom:16px;}
.stat-card{background:#0f2318;border:1px solid #1e3a2f;border-radius:12px;padding:14px 16px;}
.stat-val{font-size:24px;font-weight:800;font-family:Georgia,serif;}
.stat-lbl{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;}
.pivot-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10;}
.pivot-card{background:#0f2318;border:1px solid #1a2e22;border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;position:relative;}
.card{background:#0f2318;border:1px solid #1e3a2f;border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.tabs{display:flex;gap:4;margin-bottom:16px;background:#0a1a10;border-radius:10px;padding:4px;}
.tab{flex:1;padding:8px 4px;border-radius:8px;border:none;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;background:transparent;color:#6b7280;}
.tab.active{background:#4ade80;color:#070f09;}
.btn{width:100%;border:none;border-radius:10px;padding:13px;font-weight:800;font-size:14px;cursor:pointer;margin-bottom:8px;}
.btn-green{background:#4ade80;color:#070f09;}
.btn-yellow{background:#facc15;color:#070f09;}
.btn-blue{background:#60a5fa;color:#070f09;}
.btn-red{background:#ef4444;color:#fff;}
.btn-purple{background:#a78bfa;color:#070f09;}
.btn-orange{background:#fb923c;color:#070f09;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#070f09;border-top:1px solid #1e3a2f;display:flex;z-index:50;}
.nav-btn{flex:1;padding:10px 0;background:none;border:none;text-align:center;}
.nav-icon{font-size:16px;}
.nav-lbl{font-size:9px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;color:#4b5563;}
.nav-lbl.active{color:#4ade80;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;align-items:flex-end;}
.overlay.open{display:flex;}
.modal-box{background:#0d1f14;border-radius:20px 20px 0 0;width:100%;padding:20px 20px 48px;max-height:88vh;overflow-y:auto;}
.warn-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;align-items:center;justify-content:center;padding:20px;}
.warn-overlay.open{display:flex;}
.warn-box{background:#1a0a0a;border:1px solid #7f1d1d;border-radius:16px;padding:24px;max-width:360px;width:100%;}
.inp-label{font-size:11px;color:#6b7280;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.8px;}
.inp-field{width:100%;background:#0a1a10;border:1px solid #1e3a2f;border-radius:8px;padding:10px 12px;color:#e5e7eb;font-size:14px;margin-bottom:12px;}
.info-box{background:#0a1a10;border-radius:10px;padding:10px 12px;margin-bottom:12px;}
.warn-box-inline{background:#1a0f00;border:1px solid #854d0e;border-radius:10px;padding:10px 12px;margin-bottom:12px;}
.spray-warn-inline{background:#1a0a0a;border:1px solid #7f1d1d;border-radius:10px;padding:10px 12px;margin-bottom:12px;}
.badge{position:absolute;top:4px;right:4px;font-size:9px;border-radius:4px;padding:1px 4px;font-weight:700;}
.pulse{animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.detail-stats{display:grid;grid-template-columns:1fr 1fr;gap:10;margin-bottom:16px;}
.detail-stat{background:#0f2318;border:1px solid #1e3a2f;border-radius:10px;padding:10px 12px;}
.scroll-x{overflow-x:auto;margin-bottom:12px;}
.scroll-x-inner{display:flex;gap:6px;padding-bottom:4px;}
.pill{padding:6px 12px;border-radius:8px;border:1px solid #1e3a2f;font-size:12px;font-weight:600;white-space:nowrap;background:#0f2318;color:#6b7280;}
.pill.active{background:#4ade80;color:#070f09;border:none;}
.speed-table{background:#0f2318;border-radius:12px;border:1px solid #1e3a2f;overflow:hidden;}
.speed-row{display:grid;grid-template-columns:1fr 1fr 1fr;padding:9px 16px;border-top:1px solid #1e3a2f;}
.today-banner{background:#1a0f00;border:1px solid #854d0e;border-radius:12px;padding:12px 14px;margin-bottom:16px;cursor:pointer;}
.fert-irr-needed{border-color:#854d0e!important;}
.spray-lockout-card{border-color:#7f1d1d!important;}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-row">
      <button id="backBtn" onclick="goBack()" style="display:none;background:none;border:none;color:#4ade80;font-size:22px;padding:0;line-height:1;">←</button>
      <div>

      </div>
      <div id="dateDisplay" style="margin-left:auto;font-size:11px;color:#2d5a3d;"></div>
    </div>
  </div>

  <!-- PAGES -->
  <div id="pg-dashboard" class="page active"></div>
  <div id="pg-detail" class="page"></div>
  <div id="pg-records" class="page"></div>
  <div id="pg-tables" class="page"></div>
  <div id="pg-planner" class="page"></div>
  <div id="pg-history" class="page"></div>

  <div class="nav">
    <button class="nav-btn" onclick="showPage('dashboard')"><div class="nav-icon">⬡</div><div class="nav-lbl active" id="nl-dashboard">Farm</div></button>
    <button class="nav-btn" onclick="showPage('planner')"><div class="nav-icon">📅</div><div class="nav-lbl" id="nl-planner">Planner</div></button>
    <button class="nav-btn" onclick="showPage('records')"><div class="nav-icon">📋</div><div class="nav-lbl" id="nl-records">Records</div></button>

    <button class="nav-btn" onclick="showPage('history')"><div class="nav-icon">📜</div><div class="nav-lbl" id="nl-history">History</div></button>
  </div>

  <!-- MAIN MODAL -->
  <div class="overlay" id="mainModal" onclick="closeModalIfBg(event)">

  </div>

  <!-- WARN MODAL -->
  <div class="warn-overlay" id="warnModal">
    <div class="warn-box" id="warnContent"></div>
  </div>

</div>

// ═══════════════════════════════════════════════════════════════
function sd(id,spd){return (SPEED_TABLES[id]||{})[spd]||null;}

function calcProg(pivot){
  if(!pivot.active||!pivot.startTime)return null;
  const s=sd(pivot.id,pivot.speed);if(!s)return null;
  const totalHrs=pivot.mode==="Full Circle"?s.hrs:s.hrs/2;
  const elHrs=(Date.now()-new Date(pivot.startTime).getTime())/3600000;
  const pct=Math.min(100,(elHrs/totalHrs)*100);
  return{pct,elHrs,totalHrs,remHrs:Math.max(0,totalHrs-elHrs),
    finish:new Date(new Date(pivot.startTime).getTime()+totalHrs*3600000),
    mmApplied:s.mm*(pivot.mode==="Full Circle"?1:0.5)};
}

  const latest=sprays.sort((a,b)=>new Date(b.sprayTime)-new Date(a.sprayTime))[0];
  const elapsed=(Date.now()-new Date(latest.sprayTime).getTime())/3600000;
  if(elapsed<24)return{hoursLeft:(24-elapsed).toFixed(1)};
  return null;
}

function getFertWarn(pivotId){
  const p=state.fertRecs.filter(r=>r.pivot===pivotId&&r.needsIrrigation&&!r.irrigated);
  return p.length?p[p.length-1]:null;
}

function fmtTime(d){return d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}
function fmtDate(d){return new Date(d).toLocaleDateString("en-ZA",{day:"2-digit",month:"short",year:"numeric"});}

function drawCircle(id,pct,mode,size,active,warn){
  const cx=size/2,cy=size/2,r=size*0.38,sw=size*0.13;
  const circ=2*Math.PI*r;
  const arcMap={'Full Circle':1,'Top Side':0.5,'Bottom Side':0.5,'Top Left Quarter':0.25,'Top Right Quarter':0.25,'Bottom Left Quarter':0.25,'Bottom Right Quarter':0.25};
  const rotMap={'Full Circle':-90,'Top Side':-90,'Bottom Side':90,'Top Left Quarter':180,'Top Right Quarter':-90,'Bottom Left Quarter':90,'Bottom Right Quarter':0};
  const arc=arcMap[mode]||1;
  const rot=rotMap[mode]!=null?rotMap[mode]:-90;
  const totalArc=circ*arc,filledArc=totalArc*(pct/100);
  const trackC=warn?"#7f1d1d":"#1e3a2f";
  const remC=warn?"#450a0a":"#2d5a3d";
  const fillC=warn?"#f87171":"#4ade80";
  const dotC=active?(warn?"#f87171":"#4ade80"):"#374151";
  let armLine="";
  if(active){
    const angle=(rot+(pct/100)*arc*360)*(Math.PI/180);
    const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    armLine=`<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#facc15" stroke-width="${size*0.04}" stroke-linecap="round"/>`;
  }
  const remArc=active?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${remC}" stroke-width="${sw}" stroke-dasharray="${totalArc} ${circ}" stroke-linecap="round" transform="rotate(${rot} ${cx} ${cy})"/>`:"";
  const fillArc=active?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${fillC}" stroke-width="${sw}" stroke-dasharray="${filledArc} ${circ}" stroke-linecap="round" transform="rotate(${rot} ${cx} ${cy})"/>`:"";
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${trackC}" stroke-width="${sw}"/>
    ${remArc}${fillArc}${armLine}
    <circle cx="${cx}" cy="${cy}" r="${size*0.06}" fill="${dotC}"/>
  </svg>`;
}

function openPivot(id){state.selPivot=id;state.detailTab='irrigation';showPage('detail');}

function setPlanTab(t){state.planTab=t;renderPlanner();}

function stopPivot(id){
  const p=state.pivots.find(x=>x.id===id);
  if(p){const pr=calcProg(p);logHistory(id,'Irrigation Stopped',`${p.mode} · ${p.speed}% · ${pr?pr.pct.toFixed(1)+'% complete':'stopped'}`);}
  state.pivots=state.pivots.map(p=>p.id===id?{...p,active:false,startTime:null}:p);
  renderDetail();renderDashboard();
}

function toggleSchedDone(id){
  state.schedule=state.schedule.map(s=>s.id===id?{...s,done:!s.done}:s);

}
function deleteSchedItem(id){
  state.schedule=state.schedule.filter(s=>s.id!==id);

}

// ─── START IRRIGATION ─────────────────────────────────────────
function openStartModal(pivotId){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const defaultTime=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const fertPend=getFertWarn(pivotId);
  const defaultMode=fertPend?fertPend.side:'Full Circle';
  state.pendingStart={pivotId,mode:defaultMode,speed:100,startTime:defaultTime};
  showStartModal();
}

function mergeDT(){
  const d=document.getElementById('sm_date');
  const t=document.getElementById('sm_time');
  if(d&&t) state.pendingStart.startTime=d.value+'T'+t.value;
}

function showStartModal(){
  const f=state.pendingStart;
  const s=sd(f.pivotId,f.speed);
  const lockout=getSprayLockout(f.pivotId);
  const fertPend=getFertWarn(f.pivotId);
  const speedInfo=s?`<div class="info-box">
    <div style="font-size:11px;color:#4ade80;margin-bottom:6px;">AT ${f.speed}% SPEED</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div><div style="color:#e5e7eb;font-weight:700;">${s.mm} mm</div><div style="font-size:10px;color:#6b7280;">per revolution</div></div>
      <div><div style="color:#e5e7eb;font-weight:700;">${f.mode==='Full Circle'?s.hrs:(s.hrs/2).toFixed(1)} hrs</div><div style="font-size:10px;color:#6b7280;">total runtime</div></div>
    </div>
  </div>`:'';
  const lockoutWarn=lockout?`<div class="spray-warn-inline"><div style="font-size:12px;color:#f87171;font-weight:700;">⚠️ Spray lockout: ${lockout.hoursLeft}h remaining</div></div>`:'';
  const fertWarn=fertPend?`<div class="warn-box-inline"><div style="font-size:12px;color:#facc15;font-weight:700;">⚠️ Fertilizer not yet irrigated — check mode matches spread side (${fertPend.side})</div></div>`:'';
  const pivotOpts=PIVOT_NAMES.map(p=>`<option value="${p}"${p===f.pivotId?' selected':''}>${p}</option>`).join('');
  const speedOpts=SPEED_OPTS.map(s=>`<option value="${s}"${s===f.speed?' selected':''}>${s}%</option>`).join('');
  const modeOpts=['Full Circle','Top Side','Bottom Side'].map(m=>`<option value="${m}"${m===f.mode?' selected':''}>${m}</option>`).join('');
  document.getElementById('modalContent').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div style="font-size:18px;font-weight:800;color:#e5e7eb;">Start ${f.pivotId}</div>
      <button onclick="closeModal()" style="background:#1e3a2f;border:none;color:#9ca3af;border-radius:8px;padding:6px 14px;font-size:16px;">✕</button>
    </div>
    <div class="inp-label">Pivot</div>
    <select class="inp-field" onchange="state.pendingStart.pivotId=this.value;showStartModal();">${pivotOpts}</select>
    <div class="inp-label">Start Date (YYYY-MM-DD)</div>
    <input type="text" class="inp-field" id="sm_date" value="${f.startTime?f.startTime.slice(0,10):''}" placeholder="2026-06-02" maxlength="10" oninput="mergeDT()"/>
    <div class="inp-label">Start Time (HH:MM)</div>
    <input type="text" class="inp-field" id="sm_time" value="${f.startTime?f.startTime.slice(11,16):''}" placeholder="06:00" maxlength="5" oninput="mergeDT()"/>
    <div class="inp-label">Speed %</div>
    <select class="inp-field" onchange="state.pendingStart.speed=parseInt(this.value);showStartModal();">${speedOpts}</select>
    <div class="inp-label">Mode</div>
    <select class="inp-field" onchange="state.pendingStart.mode=this.value;showStartModal();">${modeOpts}</select>
    ${speedInfo}${lockoutWarn}${fertWarn}
    <button class="btn btn-green" onclick="submitStart()">▶ Start Irrigation</button>`;
  document.getElementById('mainModal').classList.add('open');
}

function submitStart(){
  const f=state.pendingStart;
  const lockout=getSprayLockout(f.pivotId);
  const fertWarn=getFertWarn(f.pivotId);
  if(lockout){
    closeModal();
    showWarn('⚠️ Spray Lockout Active',`${f.pivotId} was sprayed ${(24-parseFloat(lockout.hoursLeft)).toFixed(1)}h ago.\n${lockout.hoursLeft} hours remain before safe irrigation.\n\nProceed anyway?`,()=>doStart(f));
  } else if(fertWarn){
    closeModal();
    showWarn('⚠️ Fertilizer Not Irrigated',`${f.pivotId} has ${fertWarn.product} spread on the ${fertWarn.side}.\n\nNeeds 8–10mm on that side. Proceed anyway?`,()=>doStart(f));
  } else {
    doStart(f);
  }
}

function doStart(f){
  state.pivots=state.pivots.map(p=>p.id===f.pivotId?{...p,active:true,startTime:f.startTime,speed:f.speed,mode:f.mode}:p);
  logHistory(f.pivotId,'Irrigation Started',`${f.mode} · ${f.speed}% · ${f.startTime}`);
  state.fertRecs=state.fertRecs.map(r=>{
    if(r.pivot===f.pivotId&&r.needsIrrigation&&!r.irrigated){
      const match=f.mode==='Full Circle'||(r.side&&f.mode.includes(r.side.split(' ')[0]));
      return match?{...r,irrigated:true,irrigatedAt:new Date().toISOString()}:r;
    }
    return r;
  });
  closeModal();
  if(state.currentPage==='detail')renderDetail();
  renderDashboard();
}

function updateFertCalc(){
  const pid=document.getElementById('f_pivot').value;
  const rate=parseFloat(document.getElementById('f_rate').value)||0;
  const ha=HECTARES[pid]||0;
  document.getElementById('fertHaLbl').innerHTML=`${pid} = <span style="color:#60a5fa;font-weight:700;">${ha} ha</span>`;
  document.getElementById('fertKgLbl').textContent=rate>0?`${(rate*ha).toFixed(0)} kg total`:'';
}

function saveFert(){
  const pid=document.getElementById('f_pivot').value;
  const rate=parseFloat(document.getElementById('f_rate').value)||0;
  const ha=HECTARES[pid]||0;
  const overrideKg=document.getElementById('f_totalkg').value;
  const totalKg=overrideKg?overrideKg:(rate>0?(rate*ha).toFixed(0):'—');
  logHistory(pid,'Fertilizer',`${document.getElementById('f_product').value||'Unknown'} · ${document.getElementById('f_rate').value||0} kg/ha · ${document.getElementById('f_side').value}`);
  state.fertRecs.push({
    id:'f'+Date.now(),pivot:pid,
    date:document.getElementById('f_date').value,
    product:document.getElementById('f_product').value||'Unknown',
    side:document.getElementById('f_side').value,
    rate,totalKg,
    operator:document.getElementById('f_operator').value,
    notes:document.getElementById('f_notes').value,
    needsIrrigation:true,irrigated:false,spreadAt:new Date().toISOString()
  });
  closeModal();
  if(state.currentPage==='detail')renderDetail();
  else renderRecords();
  renderDashboard();
}

    <div class="inp-label">Scheduled Time (HH:MM)</div>
    <input type="text" class="inp-field" id="ps_time_only" value="${dt.slice(11,16)}" placeholder="06:00" maxlength="5"/>

    <div class="inp-label">Mode</div><select class="inp-field" id="ps_mode">${modeOpts}</select>

      <div style="font-size:11px;color:#60a5fa;">⏰ App will alert you 1 hour before and when it's time to start</div>

}

function savePreSched(){
  const entry={
    id:'ps'+Date.now(),
    pivot:document.getElementById('ps_pivot').value,
    scheduledTime:(document.getElementById('ps_date').value+'T'+document.getElementById('ps_time_only').value),
    speed:parseInt(document.getElementById('ps_speed').value),
    mode:document.getElementById('ps_mode').value,
    note:document.getElementById('ps_note').value,
    notified:false
  };
  state.preScheduled.push(entry);
  closeModal();
  renderDashboard();
  if(state.currentPage==='detail')renderDetail();
  alert(`✅ Irrigation scheduled for ${new Date(entry.scheduledTime).toLocaleString('en-ZA',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}\nYou will be reminded 1 hour before.`);
}

function deletePreSched(id){
  state.preScheduled=state.preScheduled.filter(s=>s.id!==id);
  closeModal();renderDashboard();
  if(state.currentPage==='detail')renderDetail();
}

// ─── HISTORY HELPERS ──────────────────────────────────────────
function logHistory(pivot, action, detail){
  state.historyLog.unshift({
    id:'h'+Date.now(),
    timestamp: new Date().toISOString(),
    pivot, action, detail
  });
}

function openResetDapModal(pivotId){

      <button onclick="closeModal()" style="background:#1e3a2f;border:none;color:#9ca3af;border-radius:8px;padding:6px 14px;font-size:16px;">✕</button>
    </div>
    <div style="background:#0a1a10;border-radius:10px;padding:12px;margin-bottom:16px;">
      <div style="font-size:12px;color:#6b7280;margin-bottom:4px;">Current planting</div>

      <div style="font-size:11px;color:#6b7280;margin-top:4px;">This will be saved to history</div>
    </div>
    <div class="inp-label">New Planting Date (YYYY-MM-DD)</div>

    <div class="inp-label">Notes (optional)</div>
    <input type="text" class="inp-field" id="rdap_notes" placeholder="e.g. Replanted after frost"/>
    <button class="btn btn-green" onclick="confirmResetDap('${pivotId}')">✅ Confirm New Planting</button>`;
  document.getElementById('mainModal').classList.add('open');
}

function confirmResetDap(pivotId){
  const newDate = document.getElementById('rdap_date').value.trim();
  const notes = document.getElementById('rdap_notes').value.trim();
  if(!/^\d{4}-\d{2}-\d{2}$/.test(newDate)){ alert('Please enter date as YYYY-MM-DD'); return; }
  // Save old to history
  if(!state.plantingHistory[pivotId]) state.plantingHistory[pivotId]=[];
  state.plantingHistory[pivotId].push({
    date: PLANT_DATES[pivotId],
    resetAt: new Date().toISOString(),
    notes: notes||'New crop planted'
  });
  logHistory(pivotId, 'New Crop', `Planted ${newDate}. Previous: ${PLANT_DATES[pivotId]||'unknown'}. ${notes}`);
  PLANT_DATES[pivotId] = newDate;
  closeModal();
  renderDetail();
  renderDashboard();
  alert(`✅ DAP reset for ${pivotId}\nNew planting date: ${newDate}\nPrevious date saved to history.`);
}

// ─── HISTORY PAGE ─────────────────────────────────────────────
function renderHistory(){
  const log = state.historyLog;
  const iconMap = {'New Crop':'🌱','Irrigation Started':'💧','Irrigation Stopped':'⏹','Fertilizer':'🌾','Chemical':'🧪','Pre-Scheduled':'⏰'};
  const rows = log.length ? log.map(e=>{
    const icon = iconMap[e.action]||'📝';
    const ts = new Date(e.timestamp).toLocaleString('en-ZA',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    return `<div class="card">
      <div style="display:flex;gap:10px;align-items:flex-start;">
        <div style="font-size:20px;">${icon}</div>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;">
            <div style="font-weight:700;color:#e5e7eb;font-size:13px;">${e.pivot} — ${e.action}</div>
            <div style="font-size:10px;color:#6b7280;">${ts}</div>
          </div>
          <div style="font-size:11px;color:#9ca3af;margin-top:2px;">${e.detail}</div>
        </div>
      </div>
    </div>`;
  }).join('') : '<div style="color:#6b7280;text-align:center;padding:32px;">No history yet</div>';

  // Planting history per pivot
  const plantRows = PIVOT_NAMES.filter(p=>state.plantingHistory[p]&&state.plantingHistory[p].length).map(p=>{
    const hist = state.plantingHistory[p];
    return `<div style="margin-bottom:12px;">
      <div style="font-size:11px;color:#4ade80;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">${p} — Planting History</div>
      ${hist.map(h=>`<div class="card">
        <div style="font-size:13px;font-weight:700;color:#a78bfa;">${h.date||'Unknown'}</div>
        <div style="font-size:11px;color:#6b7280;">Reset: ${new Date(h.resetAt).toLocaleDateString('en-ZA')} · ${h.notes}</div>
      </div>`).join('')}
    </div>`;
  }).join('');

  document.getElementById('pg-history').innerHTML=`
    <div class="tabs" style="margin-bottom:16px;">
      <button class="tab${state.histTab==='log'?' active':''}" onclick="setHistTab('log')">Activity Log</button>
      <button class="tab${state.histTab==='planting'?' active':''}" onclick="setHistTab('planting')">Planting History</button>
    </div>
    ${state.histTab==='log'?rows:plantRows||'<div style="color:#6b7280;text-align:center;padding:32px;">No planting history yet</div>'}`;
}
function setHistTab(t){state.histTab=t;renderHistory();}

function checkPreSchedAlerts(){
  const now=Date.now();
  state.preScheduled.forEach(s=>{
    if(s.notified)return;
    const t=new Date(s.scheduledTime).getTime();
    const diff=(t-now)/60000; // minutes until
    if(diff<=60&&diff>55){
      alert(`⏰ REMINDER: ${s.pivot} irrigation scheduled in 1 hour\n${new Date(s.scheduledTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · ${s.mode} · ${s.speed}%${s.note?' · '+s.note:''}`);
    } else if(diff<=0&&diff>-5){
      s.notified=true;
      alert(`🚿 TIME TO START: ${s.pivot} irrigation\nScheduled for ${new Date(s.scheduledTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · ${s.mode} · ${s.speed}%${s.note?' · '+s.note:''}`);
      renderDashboard();
    }
  });
}

// ─── AI CALENDAR SCAN ─────────────────────────────────────────
async function handleCalPhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async(ev)=>{
    const dataUrl=ev.target.result;
    state.calPhotos.push({dataUrl,weekLabel:'Week of '+new Date().toLocaleDateString('en-ZA'),uploadedAt:new Date().toISOString()});
    await scanPhoto(dataUrl);
    state.planTab='week';
    renderPlanner();
  };
  reader.readAsDataURL(file);
}

async function rescanPhoto(idx){
  await scanPhoto(state.calPhotos[idx].dataUrl);
  state.planTab='week';
  renderPlanner();
}

async function scanPhoto(dataUrl){
  state.aiLoading=true;renderPlanner();
  try{
    const base64=dataUrl.split(',')[1];
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},
          {type:'text',text:'This is a farm work calendar. Extract all spray and fertilizer spreading applications. Return ONLY a JSON array, no markdown, no explanation. Each item: {"pivot":"P4","day":"Mon","type":"spray","product":"Fungicide X","side":"Full Circle"}. type must be "spray" or "spread". day must be Mon/Tue/Wed/Thu/Fri/Sat/Sun. side must be Top Side, Bottom Side, or Full Circle.'}
        ]}]
      })
    });
    const data=await resp.json();
    const text=(data.content||[]).map(i=>i.text||'').join('');
    const clean=text.replace(/```json|```/g,'').trim();
    const items=JSON.parse(clean);
    items.forEach((item,i)=>{
      state.schedule.push({
        id:'ai'+Date.now()+'_'+i,
        pivot:item.pivot||'P0',day:item.day||'Mon',
        type:item.type||'spray',product:item.product||'Unknown',
        side:item.side||'Full Circle',done:false,irrigated:false
      });
    });
  }catch(err){
    alert('Could not read calendar automatically. You can add entries manually using "+ Add Entry".');
  }finally{
    state.aiLoading=false;
  }
}

function closeModal(){document.getElementById('mainModal').classList.remove('open');}

function showWarn(title,msg,onProceed){
  document.getElementById('warnContent').innerHTML=`
    <div style="font-size:18px;font-weight:800;color:#f87171;margin-bottom:12px;">${title}</div>
    <div style="font-size:14px;color:#e5e7eb;line-height:1.6;margin-bottom:20px;white-space:pre-line;">${msg}</div>
    <div style="display:flex;gap:10px;">
      <button onclick="closeWarn()" style="flex:1;padding:12px;background:#0a1a10;border:1px solid #1e3a2f;border-radius:10px;color:#9ca3af;font-weight:700;font-size:14px;">Cancel</button>
      <button onclick="warnProceed()" style="flex:1;padding:12px;background:#7f1d1d;border:none;border-radius:10px;color:#fff;font-weight:700;font-size:14px;">Proceed Anyway</button>
    </div>`;
  window._warnProceed=onProceed;
  document.getElementById('warnModal').classList.add('open');
}
function warnProceed(){if(window._warnProceed)window._warnProceed();closeWarn();}
function closeWarn(){document.getElementById('warnModal').classList.remove('open');}
