<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Waka Waka Pivot Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#070f09;color:#e5e7eb;font-family:'Trebuchet MS',Arial,sans-serif;overscroll-behavior:none;}
input,select,textarea{outline:none;-webkit-appearance:none;appearance:none;font-family:inherit;}
button{-webkit-appearance:none;appearance:none;font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{display:none;}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;}
.page{padding:16px 16px 100px;display:none;}
.page.active{display:block;}
.header{position:sticky;top:0;z-index:50;background:#070f09;border-bottom:1px solid #1e3a2f;padding:14px 20px 12px;}
.header-row{display:flex;align-items:center;gap:10;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10;margin-bottom:16px;}
.stat-card{background:#0f2318;border:1px solid #1e3a2f;border-radius:12px;padding:14px 16px;}
.stat-val{font-size:24px;font-weight:800;font-family:Georgia,serif;}
.stat-lbl{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;}
.pivot-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10;}
.pivot-card{background:#0f2318;border:1px solid #1a2e22;border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;position:relative;}
.card{background:#0f2318;border:1px solid #1e3a2f;border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.tabs{display:flex;gap:4;margin-bottom:16px;background:#0a1a10;border-radius:10px;padding:4px;}
.tab{flex:1;padding:8px 4px;border-radius:8px;border:none;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;background:transparent;color:#6b7280;}
.tab.active{background:#4ade80;color:#070f09;}
.btn{width:100%;border:none;border-radius:10px;padding:13px;font-weight:800;font-size:14px;cursor:pointer;margin-bottom:8px;}
.btn-green{background:#4ade80;color:#070f09;}
.btn-yellow{background:#facc15;color:#070f09;}
.btn-blue{background:#60a5fa;color:#070f09;}
.btn-red{background:#ef4444;color:#fff;}
.btn-purple{background:#a78bfa;color:#070f09;}
.btn-orange{background:#fb923c;color:#070f09;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#070f09;border-top:1px solid #1e3a2f;display:flex;z-index:50;}
.nav-btn{flex:1;padding:10px 0;background:none;border:none;text-align:center;}
.nav-icon{font-size:16px;}
.nav-lbl{font-size:9px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;color:#4b5563;}
.nav-lbl.active{color:#4ade80;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;align-items:flex-end;}
.overlay.open{display:flex;}
.modal-box{background:#0d1f14;border-radius:20px 20px 0 0;width:100%;padding:20px 20px 48px;max-height:88vh;overflow-y:auto;}
.warn-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;align-items:center;justify-content:center;padding:20px;}
.warn-overlay.open{display:flex;}
.warn-box{background:#1a0a0a;border:1px solid #7f1d1d;border-radius:16px;padding:24px;max-width:360px;width:100%;}
.inp-label{font-size:11px;color:#6b7280;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.8px;}
.inp-field{width:100%;background:#0a1a10;border:1px solid #1e3a2f;border-radius:8px;padding:10px 12px;color:#e5e7eb;font-size:14px;margin-bottom:12px;}
.info-box{background:#0a1a10;border-radius:10px;padding:10px 12px;margin-bottom:12px;}
.warn-box-inline{background:#1a0f00;border:1px solid #854d0e;border-radius:10px;padding:10px 12px;margin-bottom:12px;}
.spray-warn-inline{background:#1a0a0a;border:1px solid #7f1d1d;border-radius:10px;padding:10px 12px;margin-bottom:12px;}
.badge{position:absolute;top:4px;right:4px;font-size:9px;border-radius:4px;padding:1px 4px;font-weight:700;}
.pulse{animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.detail-stats{display:grid;grid-template-columns:1fr 1fr;gap:10;margin-bottom:16px;}
.detail-stat{background:#0f2318;border:1px solid #1e3a2f;border-radius:10px;padding:10px 12px;}
.scroll-x{overflow-x:auto;margin-bottom:12px;}
.scroll-x-inner{display:flex;gap:6px;padding-bottom:4px;}
.pill{padding:6px 12px;border-radius:8px;border:1px solid #1e3a2f;font-size:12px;font-weight:600;white-space:nowrap;background:#0f2318;color:#6b7280;}
.pill.active{background:#4ade80;color:#070f09;border:none;}
.speed-table{background:#0f2318;border-radius:12px;border:1px solid #1e3a2f;overflow:hidden;}
.speed-row{display:grid;grid-template-columns:1fr 1fr 1fr 40px;padding:9px 16px;border-top:1px solid #1e3a2f;}
.today-banner{background:#1a0f00;border:1px solid #854d0e;border-radius:12px;padding:12px 14px;margin-bottom:16px;cursor:pointer;}
.fert-irr-needed{border-color:#854d0e!important;}
.spray-lockout-card{border-color:#7f1d1d!important;}
/* Calendar styles */
.cal-grid{width:100%;border-collapse:collapse;font-size:11px;}
.cal-grid th{background:#0a1a10;color:#4ade80;padding:6px 4px;text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;border:1px solid #1e3a2f;position:sticky;top:0;}
.cal-grid td{border:1px solid #1e3a2f;padding:3px;vertical-align:top;min-width:38px;background:#0f2318;}
.cal-grid td.pivot-label{background:#0a1a10;color:#60a5fa;font-weight:700;font-size:10px;padding:4px 6px;white-space:nowrap;}
.cal-grid td.today-col{background:#0d2018;}
.cal-task{border-radius:4px;padding:2px 4px;margin-bottom:2px;font-size:9px;font-weight:600;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px;}
.cal-task.spray{background:#1e3a5f;color:#60a5fa;border-left:2px solid #60a5fa;}
.cal-task.spread{background:#2d2000;color:#facc15;border-left:2px solid #facc15;}
.cal-task.done{opacity:0.4;}
.day-detail-header{background:#0a1a10;border-radius:12px;padding:14px;margin-bottom:16px;}
.day-task-card{background:#0f2318;border:1px solid #1e3a2f;border-radius:10px;padding:12px;margin-bottom:10px;}
.move-day-btn{padding:5px 8px;border-radius:6px;border:1px solid #1e3a2f;background:#0a1a10;color:#9ca3af;font-size:10px;cursor:pointer;margin-right:4px;}
.move-day-btn:hover{border-color:#4ade80;color:#4ade80;}
.diary-box{background:#0a1a10;border:1px solid #1e3a2f;border-radius:10px;padding:12px;margin-bottom:16px;}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-row">
      <button id="backBtn" onclick="goBack()" style="display:none;background:none;border:none;color:#4ade80;font-size:22px;padding:0;line-height:1;">←</button>
      <div>
        <div id="pageTitle" style="font-size:22px;font-weight:900;color:#e5e7eb;font-family:Georgia,serif;letter-spacing:-0.5px;">Waka Waka</div>
        <div id="pageSubtitle" style="font-size:10px;color:#2d5a3d;text-transform:uppercase;letter-spacing:2px;">Pivot Tracker</div>
      </div>
      <div id="dateDisplay" style="margin-left:auto;font-size:11px;color:#2d5a3d;"></div>
    </div>
  </div>

  <!-- PAGES -->
  <div id="pg-dashboard" class="page active"></div>
  <div id="pg-detail" class="page"></div>
  <div id="pg-records" class="page"></div>
  <div id="pg-tables" class="page"></div>
  <div id="pg-planner" class="page"></div>
  <div id="pg-history" class="page"></div>
  <div id="pg-calendar" class="page"></div>

  <!-- BOTTOM NAV -->
  <div class="nav">
    <button class="nav-btn" onclick="showPage('dashboard')"><div class="nav-icon">⬡</div><div class="nav-lbl active" id="nl-dashboard">Farm</div></button>
    <button class="nav-btn" onclick="showPage('planner')"><div class="nav-icon">📅</div><div class="nav-lbl" id="nl-planner">Planner</div></button>
    <button class="nav-btn" onclick="showPage('records')"><div class="nav-icon">📋</div><div class="nav-lbl" id="nl-records">Records</div></button>
    <button class="nav-btn" onclick="showPage('tables')"><div class="nav-icon">⚡</div><div class="nav-lbl" id="nl-tables">Tables</div></button>
    <button class="nav-btn" onclick="showPage('calendar')"><div class="nav-icon">📆</div><div class="nav-lbl" id="nl-calendar">Calendar</div></button>
    <button class="nav-btn" onclick="showPage('history')"><div class="nav-icon">📜</div><div class="nav-lbl" id="nl-history">History</div></button>
  </div>

  <!-- MAIN MODAL -->
  <div class="overlay" id="mainModal" onclick="closeModalIfBg(event)">
    <div class="modal-box" id="modalContent"></div>
  </div>

  <!-- WARN MODAL -->
  <div class="warn-overlay" id="warnModal">
    <div class="warn-box" id="warnContent"></div>
  </div>

</div>

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function sd(id,spd){return (SPEED_TABLES[id]||{})[spd]||null;}

function calcProg(pivot){
  if(!pivot.active||!pivot.startTime)return null;
  const s=sd(pivot.id,pivot.speed);if(!s)return null;
  const totalHrs=pivot.mode==="Full Circle"?s.hrs:s.hrs/2;
  const elHrs=(Date.now()-new Date(pivot.startTime).getTime())/3600000;
  const pct=Math.min(100,(elHrs/totalHrs)*100);
  return{pct,elHrs,totalHrs,remHrs:Math.max(0,totalHrs-elHrs),
    finish:new Date(new Date(pivot.startTime).getTime()+totalHrs*3600000),
    mmApplied:s.mm*(pivot.mode==="Full Circle"?1:0.5)};
}

function getSprayLockout(pivotId){
  const sprays=state.chemRecs.filter(r=>r.pivot===pivotId&&r.sprayTime);
  if(!sprays.length)return null;
  const latest=sprays.sort((a,b)=>new Date(b.sprayTime)-new Date(a.sprayTime))[0];
  const elapsed=(Date.now()-new Date(latest.sprayTime).getTime())/3600000;
  if(elapsed<24)return{hoursLeft:(24-elapsed).toFixed(1)};
  return null;
}

function getFertWarn(pivotId){
  const p=state.fertRecs.filter(r=>r.pivot===pivotId&&r.needsIrrigation&&!r.irrigated);
  return p.length?p[p.length-1]:null;
}

function fmtTime(d){return d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}
function fmtDate(d){return new Date(d).toLocaleDateString("en-ZA",{day:"2-digit",month:"short",year:"numeric"});}

function drawCircle(id,pct,mode,size,active,warn){
  const cx=size/2,cy=size/2,r=size*0.38,sw=size*0.13;
  const circ=2*Math.PI*r;
  const arcMap={'Full Circle':1,'Top Side':0.5,'Bottom Side':0.5,
    'Top Left Quarter':0.25,'Top Right Quarter':0.25,'Bottom Left Quarter':0.25,'Bottom Right Quarter':0.25,
    'Top Left Eighth':0.125,'Top Right Eighth':0.125,'Upper Right Eighth':0.125,'Lower Right Eighth':0.125,
    'Bottom Right Eighth':0.125,'Bottom Left Eighth':0.125,'Lower Left Eighth':0.125,'Upper Left Eighth':0.125};
  const rotMap={
    'Full Circle':-90,'Top Side':-90,'Bottom Side':90,
    'Top Left Quarter':180,'Top Right Quarter':-90,'Bottom Left Quarter':90,'Bottom Right Quarter':0,
    'Top Left Eighth':-180,'Top Right Eighth':-90,'Upper Right Eighth':-45,
    'Lower Right Eighth':0,'Bottom Right Eighth':45,'Bottom Left Eighth':90,
    'Lower Left Eighth':135,'Upper Left Eighth':180
  };
  const arc=arcMap[mode]||1;
  const rot=rotMap[mode]!=null?rotMap[mode]:-90;
  const totalArc=circ*arc,filledArc=totalArc*(pct/100);
  const trackC=warn?"#7f1d1d":"#1e3a2f";
  const remC=warn?"#450a0a":"#2d5a3d";
  const fillC=warn?"#f87171":"#4ade80";
  const dotC=active?(warn?"#f87171":"#4ade80"):"#374151";

  // Draw divider lines for visual reference
  let divLines="";
  if(mode==='Top Side'||mode==='Bottom Side'){
    divLines=`<line x1="${cx-r-sw/2}" y1="${cy}" x2="${cx+r+sw/2}" y2="${cy}" stroke="#1e3a2f" stroke-width="1" stroke-dasharray="2,2"/>`;
  } else if(mode.includes('Quarter')){
    divLines=`<line x1="${cx-r-sw/2}" y1="${cy}" x2="${cx+r+sw/2}" y2="${cy}" stroke="#1e3a2f" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="${cx}" y1="${cy-r-sw/2}" x2="${cx}" y2="${cy+r+sw/2}" stroke="#1e3a2f" stroke-width="1" stroke-dasharray="2,2"/>`;
  } else if(mode.includes('Eighth')){
    // All 8 divider lines (every 45°)
    const divR=r+sw/2;
    const lines=Array.from({length:8},(_,i)=>{
      const a=(i*45-90)*Math.PI/180;
      return`<line x1="${cx}" y1="${cy}" x2="${cx+divR*Math.cos(a)}" y2="${cy+divR*Math.sin(a)}" stroke="#1e3a2f" stroke-width="1" stroke-dasharray="2,2"/>`;
    }).join('');
    divLines=lines;
  }

  // Mode label abbreviation inside circle
  const modeAbbr={
    'Full Circle':'FC','Top Side':'T½','Bottom Side':'B½',
    'Top Left Quarter':'TL¼','Top Right Quarter':'TR¼','Bottom Left Quarter':'BL¼','Bottom Right Quarter':'BR¼',
    'Top Left Eighth':'TL⅛','Top Right Eighth':'TR⅛','Upper Right Eighth':'UR⅛','Lower Right Eighth':'LR⅛',
    'Bottom Right Eighth':'BR⅛','Bottom Left Eighth':'BL⅛','Lower Left Eighth':'LL⅛','Upper Left Eighth':'UL⅛'
  }[mode]||'';
  const labelSize=size*0.14;

  let armLine="";
  if(active){
    const angle=(rot+(pct/100)*arc*360)*(Math.PI/180);
    const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    armLine=`<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#facc15" stroke-width="${size*0.04}" stroke-linecap="round"/>`;
  }
  const remArc=active?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${remC}" stroke-width="${sw}" stroke-dasharray="${totalArc} ${circ}" stroke-linecap="round" transform="rotate(${rot} ${cx} ${cy})"/>`:"";
  const fillArc=active?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${fillC}" stroke-width="${sw}" stroke-dasharray="${filledArc} ${circ}" stroke-linecap="round" transform="rotate(${rot} ${cx} ${cy})"/>`:"";
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${trackC}" stroke-width="${sw}"/>
    ${divLines}
    ${remArc}${fillArc}${armLine}
    <circle cx="${cx}" cy="${cy}" r="${size*0.06}" fill="${dotC}"/>
    ${mode!=='Full Circle'?`<text x="${cx}" y="${cy+size*0.05}" text-anchor="middle" fill="#6b7280" font-size="${labelSize}" font-family="Arial">${modeAbbr}</text>`:''}
  </svg>`;
}

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
function showPage(pg){
  state.currentPage=pg;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+pg).classList.add('active');
  document.querySelectorAll('.nav-lbl').forEach(l=>l.classList.remove('active'));
  const nl=document.getElementById('nl-'+pg);
  if(nl)nl.classList.add('active');
  const isHome=pg==='dashboard';
  document.getElementById('backBtn').style.display=(!isHome&&pg!=='planner'&&pg!=='records'&&pg!=='tables')?'':'none';
  document.getElementById('pageTitle').style.fontSize=(isHome?'22':'18')+'px';
  document.getElementById('dateDisplay').style.display=isHome?'':'none';
  const titles={dashboard:'Waka Waka',detail:state.selPivot||'',records:'Records',tables:'Speed Tables',planner:'Weekly Planner',history:'History',calendar:'Calendar'};
  document.getElementById('pageTitle').textContent=titles[pg]||pg;
  document.getElementById('pageSubtitle').style.display=isHome?'':'none';
  render(pg);
}

function goBack(){showPage('dashboard');}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render(pg){
  if(pg==='dashboard')renderDashboard();
  else if(pg==='detail')renderDetail();
  else if(pg==='records')renderRecords();
  else if(pg==='tables')renderTables();
  else if(pg==='planner')renderPlanner();
  else if(pg==='history')renderHistory();
  else if(pg==='calendar')renderCalendar();
}

// ─── DASHBOARD ────────────────────────────────────────────────
function renderDashboard(){
  const active=state.pivots.filter(p=>p.active);
  const completed=active.filter(p=>{const pr=calcProg(p);return pr&&pr.pct>=100;});
  const activeHa=active.reduce((s,p)=>s+(HECTARES[p.id]||0),0);
  const todayIdx=new Date().getDay();
  const todayDay=DAYS[todayIdx===0?6:todayIdx-1];
  const todayTasks=state.schedule.filter(s=>!s.done&&s.day===todayDay);

  function sColor(pivot,pr){
    if(!pivot.active)return'#6b7280';
    const pct=pr?pr.pct:0;
    if(pct>=95)return'#facc15';
    return'#4ade80';
  }
  function sLabel(pivot,pr){
    if(!pivot.active)return'Off';
    const pct=pr?pr.pct:0;
    if(pct>=100)return'Done ✓';
    if(pct>=95)return'Near Finish';
    return'Running';
  }

  let pivotCards=state.pivots.map(pivot=>{
    const pr=calcProg(pivot);
    const pct=pr?pr.pct:0;
    const ha=HECTARES[pivot.id]||0;
    const dap=getDap(pivot.id);
    const lockout=getSprayLockout(pivot.id);
    const fertPend=getFertWarn(pivot.id);
    const sc=sColor(pivot,pr);
    const sl=sLabel(pivot,pr);
    const mmApp=pr?(pr.mmApplied*pct/100).toFixed(1):'0.0';
    const finishStr=(pr&&pct<100)?fmtTime(pr.finish):'—';
    const badge=lockout?'<span style="background:#7f1d1d;color:#f87171;font-size:9px;border-radius:4px;padding:1px 5px;font-weight:700;">🔒</span>':
                fertPend?'<span style="background:#854d0e;color:#facc15;font-size:9px;border-radius:4px;padding:1px 5px;font-weight:700;">💧</span>':'';
    const borderC=lockout?'#7f1d1d':fertPend?'#854d0e':pivot.active?(pct>=95?'#854d0e':'#2d5a3d'):'#1e3a2f';
    return`<div onclick="openPivot('${pivot.id}')" style="background:#0f2318;border:1px solid ${borderC};border-radius:12px;padding:10px;cursor:pointer;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
        <div>
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
            <span style="font-size:15px;font-weight:900;color:#e5e7eb;">${pivot.id}</span>
            <span style="width:7px;height:7px;border-radius:50%;background:${sc};display:inline-block;flex-shrink:0;"></span>
            ${badge}
          </div>
          <div style="font-size:9px;color:#6b7280;">${ha}ha · DAP${dap!==null?dap:'?'}</div>
          <div style="font-size:9px;color:${sc};font-weight:600;">${sl}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:20px;font-weight:900;color:${sc};line-height:1;">${pct.toFixed(0)}%</div>
          <div style="font-size:8px;color:#6b7280;">Complete</div>
          ${pivot.active?`<div style="font-size:9px;color:#9ca3af;">${pivot.speed}%spd</div>`:''}
        </div>
      </div>
      ${drawCircle(pivot.id,pct,pivot.mode,52,pivot.active,!!lockout)}
      ${pivot.active?`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:5px;">
        <div style="font-size:9px;color:#6b7280;">Finish:<span style="color:#e5e7eb;"> ${finishStr}</span></div>
        <div style="font-size:9px;color:#6b7280;">mm:<span style="color:#4ade80;"> ${mmApp}</span></div>
      </div>`:''}
    </div>`;
  }).join('');

  let todayBanner='';
  if(todayTasks.length>0){
    const items=todayTasks.slice(0,3).map(t=>`<div style="font-size:12px;color:#9ca3af;margin-bottom:2px;">${t.type==='spray'?'🧪':'🌱'} ${t.pivot} — ${t.product} (${t.side})</div>`).join('');
    const more=todayTasks.length>3?`<div style="font-size:11px;color:#6b7280;">+${todayTasks.length-3} more</div>`:'';
    todayBanner=`<div class="today-banner" onclick="showPage('planner')">
      <div style="font-size:12px;font-weight:700;color:#facc15;margin-bottom:6px;">📅 TODAY'S TASKS (${todayDay})</div>
      ${items}${more}
    </div>`;
  }

  document.getElementById('pg-dashboard').innerHTML=`
    <!-- Farm header bar -->
    <div style="background:#0a1a10;border:1px solid #1e3a2f;border-radius:12px;padding:12px;margin-bottom:12px;">
      <div style="font-size:13px;font-weight:900;color:#4ade80;letter-spacing:1px;margin-bottom:8px;">🌿 MULLER FARM — WAKA WAKA</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;">
        <div style="text-align:center;">
          <div style="font-size:18px;font-weight:800;color:#4ade80;">${active.length}</div>
          <div style="font-size:9px;color:#6b7280;text-transform:uppercase;">Running</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:18px;font-weight:800;color:#60a5fa;">${TOTAL_HA}</div>
          <div style="font-size:9px;color:#6b7280;text-transform:uppercase;">Total ha</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:18px;font-weight:800;color:#facc15;">${activeHa}</div>
          <div style="font-size:9px;color:#6b7280;text-transform:uppercase;">Active ha</div>
        </div>
        <div style="text-align:center;cursor:pointer;" onclick="showPage('planner')">
          <div style="font-size:18px;font-weight:800;color:#fb923c;">${todayTasks.length}</div>
          <div style="font-size:9px;color:#6b7280;text-transform:uppercase;">Tasks</div>
        </div>
      </div>
    </div>
    ${todayBanner}
    <div style="font-size:11px;color:#4ade80;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;">All Pivots</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">${pivotCards}</div>`;
}

// ─── PIVOT DETAIL ─────────────────────────────────────────────
function renderDetail(){
  const pivot=state.pivots.find(p=>p.id===state.selPivot);
  if(!pivot)return;
  const pr=calcProg(pivot);
  const ha=HECTARES[pivot.id]||0;
  const lockout=getSprayLockout(pivot.id);
  const fertPend=getFertWarn(pivot.id);

  const tabDefs=[['irrigation','💧 Irrig'],['irrigHistory','📈 Irrig Hist'],['fertilizer','🌾 Fert'],['chemical','🧪 Chem'],['program','📋 Program'],['planting','🌱 Plant']];
  const tabs=tabDefs.map(([t,lbl])=>`<button onclick="setDetailTab('${t}')" style="flex:0 0 auto;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap;background:${state.detailTab===t?'#4ade80':'#0a1a10'};color:${state.detailTab===t?'#070f09':'#6b7280'};">${lbl}</button>`).join('');

  let lockoutBanner=lockout?`<div style="background:#1a0a0a;border:1px solid #7f1d1d;border-radius:10px;padding:10px 14px;margin-bottom:12px;"><div style="font-size:13px;font-weight:700;color:#f87171;">🔒 Spray Lockout: ${lockout.hoursLeft}h remaining</div><div style="font-size:11px;color:#9ca3af;margin-top:2px;">You can still start irrigation if needed</div></div>`:'';
  let fertBanner=(!lockout&&fertPend)?`<div style="background:#1a0f00;border:1px solid #854d0e;border-radius:10px;padding:10px 14px;margin-bottom:12px;"><div style="font-size:13px;font-weight:700;color:#facc15;">💧 Fertilizer needs irrigation</div><div style="font-size:11px;color:#9ca3af;margin-top:2px;">${fertPend.product} — irrigate 8–10mm on ${fertPend.side}</div></div>`:'';

  let tabContent='';
  if(state.detailTab==='irrigHistory'){
    const hist=(state.irrigHistory[pivot.id]||[]);
    // Group by season
    const seasons=[...new Set(hist.map(h=>h.season))];
    const totalRuns=hist.length;
    const totalMm=hist.reduce((s,h)=>s+parseFloat(h.mmApplied||0),0).toFixed(1);
    const totalM3=hist.reduce((s,h)=>s+parseFloat(h.m3||0),0).toFixed(0);
    const seasonGroups=seasons.map(season=>{
      const runs=hist.filter(h=>h.season===season);
      const rows=runs.map(h=>`<div class="card" style="margin-bottom:6px;">
        <div style="display:flex;justify-content:space-between;">
          <div style="font-size:12px;font-weight:700;color:#4ade80;">${new Date(h.startTime||h.stopTime).toLocaleDateString('en-ZA',{day:'2-digit',month:'short'})}</div>
          <div style="font-size:11px;color:#6b7280;">${h.mmApplied} mm · ${h.m3} m³</div>
        </div>
        <div style="font-size:11px;color:#9ca3af;">${h.mode} · ${h.speed}% · ${h.pctComplete}% complete</div>
        <div style="font-size:10px;color:#6b7280;">${h.startTime?new Date(h.startTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):''} → ${h.stopTime?new Date(h.stopTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):''}</div>
      </div>`).join('');
      const sTotal=runs.reduce((s,h)=>s+parseFloat(h.mmApplied||0),0).toFixed(1);
      return`<div style="margin-bottom:12px;">
        <div style="font-size:11px;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">${season} — ${runs.length} runs · ${sTotal} mm total</div>
        ${rows}
      </div>`;
    }).join('');
    tabContent=`
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">
        <div style="background:#0d2018;border-radius:10px;padding:10px;text-align:center;"><div style="font-size:20px;font-weight:800;color:#4ade80;">${totalRuns}</div><div style="font-size:10px;color:#9ca3af;">Total Runs</div></div>
        <div style="background:#0a1a10;border-radius:10px;padding:10px;text-align:center;"><div style="font-size:16px;font-weight:800;color:#60a5fa;">${totalMm}</div><div style="font-size:10px;color:#9ca3af;">mm Total</div></div>
        <div style="background:#0a1a10;border-radius:10px;padding:10px;text-align:center;"><div style="font-size:16px;font-weight:800;color:#a78bfa;">${totalM3}</div><div style="font-size:10px;color:#9ca3af;">m³ Total</div></div>
      </div>
      ${hist.length?seasonGroups:'<div style="color:#6b7280;text-align:center;padding:24px;">No irrigation history yet.<br/><span style="font-size:12px;">Runs are logged when you stop irrigation.</span></div>'}`;
  } else if(state.detailTab==='irrigation'){
    let stats='';
    if(pivot.active&&pr){
      const mmNow=(pr.mmApplied*pr.pct/100).toFixed(1);
      const m3=((pr.mmApplied*pr.pct/100)*ha*10).toFixed(0);
      stats=`<div class="detail-stats">
        ${[['Progress',pr.pct.toFixed(1)+'%'],['Speed',pivot.speed+'%'],['Elapsed',pr.elHrs.toFixed(1)+' hrs'],['Remaining',pr.remHrs.toFixed(1)+' hrs'],['Total Runtime',pr.totalHrs.toFixed(1)+' hrs'],['mm Applied',mmNow+' mm'],['Total Water',m3+' m³'],['Est. Finish',fmtTime(pr.finish)]].map(([l,v])=>`<div class="detail-stat"><div style="font-size:16px;font-weight:700;color:#4ade80;">${v}</div><div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:0.8px;">${l}</div></div>`).join('')}
      </div>`;
    } else {
      stats=`<div style="background:#0f2318;border:1px solid #1e3a2f;border-radius:12px;padding:24px;text-align:center;margin-bottom:16px;"><div style="color:#6b7280;font-size:14px;">Pivot is idle</div></div>`;
    }
    const btnLabel=lockout?'⚠️ Start Irrigation (Lockout Active)':fertPend?'💧 Start Irrigation (Fert Pending)':'▶ Start Irrigation';
    const btnBg=lockout?'#7f1d1d':fertPend?'#854d0e':'#4ade80';
    const btnTxt=lockout||fertPend?'#fff':'#070f09';
    const btn=!pivot.active
      ?`<button class="btn" style="background:${btnBg};color:${btnTxt};" onclick="openStartModal('${pivot.id}')">${btnLabel}</button>`
      :`<button class="btn btn-red" onclick="stopPivot('${pivot.id}')">■ Stop Irrigation</button>`;
    const preSchedBtn=`<button class="btn" style="background:#1e3a5f;color:#60a5fa;border:1px solid #1e4a6f;margin-top:4px;" onclick="openPreSchedIrrModal('${pivot.id}')">⏰ Schedule Future Irrigation${state.preScheduled.filter(s=>s.pivot===pivot.id).length?` (${state.preScheduled.filter(s=>s.pivot===pivot.id).length})`:''}`;
    tabContent=stats+btn+preSchedBtn+'</button>';
  } else if(state.detailTab==='fertilizer'){
    const recs=state.fertRecs.filter(r=>r.pivot===pivot.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const rows=recs.length?recs.map(r=>`<div class="card${r.needsIrrigation&&!r.irrigated?' fert-irr-needed':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-weight:700;color:#facc15;font-size:14px;">${r.product}</div>
        <div style="font-size:11px;color:#6b7280;">${r.date}</div>
      </div>
      <div style="font-size:12px;color:#9ca3af;margin-top:2px;">${r.rate} kg/ha · ${r.totalKg} kg · ${r.side}</div>
      ${r.needsIrrigation&&!r.irrigated?`<div style="font-size:11px;color:#fb923c;margin-top:2px;">💧 Needs 8–10mm on ${r.side}</div>`:''}
      ${r.irrigated?`<div style="font-size:11px;color:#4ade80;margin-top:2px;">✓ Irrigated</div>`:''}
      ${r.operator?`<div style="font-size:11px;color:#6b7280;">👤 ${r.operator}</div>`:''}
    </div>`).join(''):`<div style="color:#6b7280;text-align:center;padding:24px;">No fertilizer records yet</div>`;

  } else {

// ACTIONS
// ═══════════════════════════════════════════════════════════════
function openPivot(id){state.selPivot=id;state.detailTab='irrigation';showPage('detail');}
function setDetailTab(t){state.detailTab=t;renderDetail();}
function setRecTab(t){state.recTab=t;renderRecords();}
function setTblPivot(p){state.tblPivot=p;renderTables();}
function setPlanTab(t){state.planTab=t;renderPlanner();}

function stopPivot(id){
  const p=state.pivots.find(x=>x.id===id);
  if(p){
    const pr=calcProg(p);
    logHistory(id,'Irrigation Stopped',`${p.mode} · ${p.speed}% · ${pr?pr.pct.toFixed(1)+'% complete':'stopped'}`);
    // Save to irrigation history
    if(!state.irrigHistory[id])state.irrigHistory[id]=[];
    const ha=HECTARES[id]||0;
    const mmApp=pr?(pr.mmApplied*pr.pct/100).toFixed(1):0;
    const m3=pr?((pr.mmApplied*pr.pct/100)*ha*10).toFixed(0):0;
    const now=new Date();
    const month=now.getMonth();
    const season=month>=3&&month<=8?'Autumn/Winter':'Spring/Summer';
    state.irrigHistory[id].unshift({
      id:'ih'+Date.now(),
      startTime:p.startTime,
      stopTime:new Date().toISOString(),
      mode:p.mode,speed:p.speed,
      mmApplied:mmApp,m3,
      pctComplete:pr?pr.pct.toFixed(1):0,
      season
    });
  }
  state.pivots=state.pivots.map(p=>p.id===id?{...p,active:false,startTime:null}:p);
  saveState();
  renderDetail();renderDashboard();
}

function toggleSchedDone(id){
  state.schedule=state.schedule.map(s=>s.id===id?{...s,done:!s.done}:s);
  renderPlanner();renderDashboard();
}
function deleteSchedItem(id){
  state.schedule=state.schedule.filter(s=>s.id!==id);
  renderPlanner();renderDashboard();
}

// ─── START IRRIGATION ─────────────────────────────────────────
function openStartModal(pivotId){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const defaultTime=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const fertPend=getFertWarn(pivotId);
  const defaultMode=fertPend?fertPend.side:'Full Circle';
  state.pendingStart={pivotId,mode:defaultMode,speed:100,startTime:defaultTime};
  showStartModal();
}

function openStartFromTable(pivotId, speed){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const defaultTime=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
  state.pendingStart={pivotId,mode:'Full Circle',speed,startTime:defaultTime};
  showStartModal();
}

function mergeDT(){
  const d=document.getElementById('sm_date');
  const t=document.getElementById('sm_time');
  if(d&&t) state.pendingStart.startTime=d.value+'T'+t.value;
}

function showStartModal(){
  const f=state.pendingStart;
  const s=sd(f.pivotId,f.speed);
  const lockout=getSprayLockout(f.pivotId);
  const fertPend=getFertWarn(f.pivotId);
  const speedInfo=s?`<div class="info-box">
    <div style="font-size:11px;color:#4ade80;margin-bottom:6px;">AT ${f.speed}% SPEED</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div><div style="color:#e5e7eb;font-weight:700;">${s.mm} mm</div><div style="font-size:10px;color:#6b7280;">per revolution</div></div>

    <select class="inp-field" onchange="state.pendingStart.mode=this.value;showStartModal();">${modeOpts}</select>

function submitStart(){
  const f=state.pendingStart;
  const lockout=getSprayLockout(f.pivotId);
  const fertWarn=getFertWarn(f.pivotId);
  if(lockout){
    closeModal();
    showWarn('⚠️ Spray Lockout Active',`${f.pivotId} was sprayed ${(24-parseFloat(lockout.hoursLeft)).toFixed(1)}h ago.\n${lockout.hoursLeft} hours remain before safe irrigation.\n\nProceed anyway?`,()=>doStart(f));
  } else if(fertWarn){
    closeModal();
    showWarn('⚠️ Fertilizer Not Irrigated',`${f.pivotId} has ${fertWarn.product} spread on the ${fertWarn.side}.\n\nNeeds 8–10mm on that side. Proceed anyway?`,()=>doStart(f));
  } else {
    doStart(f);
  }
}

function doStart(f){
  state.pivots=state.pivots.map(p=>p.id===f.pivotId?{...p,active:true,startTime:f.startTime,speed:f.speed,mode:f.mode}:p);
  logHistory(f.pivotId,'Irrigation Started',`${f.mode} · ${f.speed}% · ${f.startTime}`);
  state.fertRecs=state.fertRecs.map(r=>{
    if(r.pivot===f.pivotId&&r.needsIrrigation&&!r.irrigated){
      const match=f.mode==='Full Circle'||(r.side&&f.mode.includes(r.side.split(' ')[0]));
      return match?{...r,irrigated:true,irrigatedAt:new Date().toISOString()}:r;
    }
    return r;
  });
  closeModal();
  if(state.currentPage==='detail')renderDetail();
  renderDashboard();
}

function editSchedItem(id){ openSchedModal(id); }

function splitTask(existingId){
  const orig=state.schedule.find(s=>s.id===existingId);
  if(!orig)return;
  const otherSide=document.getElementById('split_side').value;
  const otherDay=document.getElementById('split_day').value;
  const newTask={
    id:'s'+Date.now(),
    pivot:orig.pivot,
    day:otherDay,
    type:orig.type,
    product:orig.product,
    side:otherSide,
    note:`Split from ${orig.side} task`,
    done:false,irrigated:false
  };
  // Check conflicts
  const lockout=getSprayLockout(orig.pivot);
  const fertPend=getFertWarn(orig.pivot);
  const hasConflict=(orig.type==='spray'&&lockout)||(orig.type==='spread'&&fertPend);
  if(hasConflict){
    closeModal();
    showWarn('⚠️ Conflict on Split Task',
      `${orig.pivot} has ${lockout?'a spray lockout active':'fertilizer pending irrigation'}.

Add the ${otherSide} task for ${otherDay} anyway?`,
      ()=>{state.schedule.push(newTask);renderPlanner();renderCalendar();renderDashboard();}
    );
  } else {
    state.schedule.push(newTask);
    closeModal();
    saveState();
    renderPlanner();renderCalendar();renderDashboard();
    alert(`✅ Split task added!\n${orig.pivot} ${otherSide} scheduled for ${otherDay}`);
  }
}

function saveSched(existingId){
  const entry = {
    pivot:document.getElementById('sc_pivot').value,
    day:document.getElementById('sc_day').value,
    type:document.getElementById('sc_type').value,
    product:document.getElementById('sc_product').value||'Unknown',
    side:document.getElementById('sc_side').value,
    note:document.getElementById('sc_note')?document.getElementById('sc_note').value:'',
    done:false,irrigated:false
  };
  if(existingId){
    state.schedule=state.schedule.map(s=>s.id===existingId?{...s,...entry,done:s.done}:s);
  } else {
    state.schedule.push({id:'s'+Date.now(),...entry});
  }
  closeModal();
  renderPlanner();
  if(state.currentPage==='calendar')renderCalendar();
  renderDashboard();
}

function openPreSchedIrrModal(pivotId){
  // Show list of all scheduled irrigations for this pivot first
  const existing=state.preScheduled.filter(s=>s.pivot===pivotId).sort((a,b)=>new Date(a.scheduledTime)-new Date(b.scheduledTime));
  const now=Date.now();

  const existCards=existing.length?existing.map(s=>{
    const sd_data=sd(s.pivot,s.speed);
    const totalHrs=sd_data?(sd_data.hrs*({'Full Circle':1,'Top Side':0.5,'Bottom Side':0.5,'Top Left Quarter':0.25,'Top Right Quarter':0.25,'Bottom Left Quarter':0.25,'Bottom Right Quarter':0.25,'Top Left Eighth':0.125,'Top Right Eighth':0.125,'Upper Right Eighth':0.125,'Lower Right Eighth':0.125,'Bottom Right Eighth':0.125,'Bottom Left Eighth':0.125,'Lower Left Eighth':0.125,'Upper Left Eighth':0.125}[s.mode]||1)):0;
    const mmApp=sd_data?sd_data.mm*({'Full Circle':1,'Top Side':0.5,'Bottom Side':0.5,'Top Left Quarter':0.25,'Top Right Quarter':0.25,'Bottom Left Quarter':0.25,'Bottom Right Quarter':0.25,'Top Left Eighth':0.125,'Top Right Eighth':0.125,'Upper Right Eighth':0.125,'Lower Right Eighth':0.125,'Bottom Right Eighth':0.125,'Bottom Left Eighth':0.125,'Lower Left Eighth':0.125,'Upper Left Eighth':0.125}[s.mode]||1):0;
    const ha=HECTARES[s.pivot]||0;
    const t=new Date(s.scheduledTime).getTime();
    const diff=t-now;
    const isFuture=diff>0;
    const mins=Math.abs(Math.round(diff/60000));
    const timeUntil=isFuture?(mins<60?`in ${mins}min`:`in ${Math.floor(mins/60)}h ${mins%60}m`):'overdue';
    return`<div onclick="openPreSchedDetail('${s.id}')" style="background:#0a1a10;border:1px solid #1e4a6f;border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;">

          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px;">
            <div style="background:#070f09;border-radius:6px;padding:6px;text-align:center;">
              <div style="font-size:13px;font-weight:700;color:#4ade80;">${mmApp.toFixed(1)}</div>
              <div style="font-size:9px;color:#6b7280;">mm</div>
            </div>
            <div style="background:#070f09;border-radius:6px;padding:6px;text-align:center;">
              <div style="font-size:13px;font-weight:700;color:#4ade80;">${totalHrs.toFixed(1)}</div>
              <div style="font-size:9px;color:#6b7280;">hrs</div>
            </div>
            <div style="background:#070f09;border-radius:6px;padding:6px;text-align:center;">
              <div style="font-size:13px;font-weight:700;color:#4ade80;">${(mmApp*ha*10).toFixed(0)}</div>
              <div style="font-size:9px;color:#6b7280;">m³</div>
            </div>
          </div>
          ${s.note?`<div style="font-size:11px;color:#6b7280;margin-top:4px;">📝 ${s.note}</div>`:''}
        </div>
        <div style="text-align:right;margin-left:8px;">
          <div style="font-size:10px;color:${isFuture?'#4ade80':'#fb923c'};font-weight:700;">${timeUntil}</div>
          <button onclick="event.stopPropagation();deletePreSched('${s.id}')" style="background:none;border:none;color:#6b7280;font-size:16px;cursor:pointer;margin-top:4px;">✕</button>
        </div>
      </div>
    </div>`;
  }).join(''):`<div style="background:#0a1a10;border:1px solid #1e3a2f;border-radius:10px;padding:16px;text-align:center;margin-bottom:12px;color:#6b7280;font-size:13px;">No scheduled irrigations for ${pivotId}</div>`;

  const pad=n=>String(n).padStart(2,'0');
  const nowDt=new Date();
  const dt=`${nowDt.getFullYear()}-${pad(nowDt.getMonth()+1)}-${pad(nowDt.getDate())}T${pad(nowDt.getHours())}:${pad(nowDt.getMinutes())}`;

function updatePreSchedInfo(){
  const pid=document.getElementById('ps_pivot')?document.getElementById('ps_pivot').value:'P0';
  const spd=parseInt(document.getElementById('ps_speed')?document.getElementById('ps_speed').value:100);
  const mode=document.getElementById('ps_mode')?document.getElementById('ps_mode').value:'Full Circle';
  const modeMap={'Full Circle':1,'Top Side':0.5,'Bottom Side':0.5,
    'Top Left Quarter':0.25,'Top Right Quarter':0.25,'Bottom Left Quarter':0.25,'Bottom Right Quarter':0.25,
    'Top Left Eighth':0.125,'Top Right Eighth':0.125,'Upper Right Eighth':0.125,'Lower Right Eighth':0.125,
    'Bottom Right Eighth':0.125,'Bottom Left Eighth':0.125,'Lower Left Eighth':0.125,'Upper Left Eighth':0.125};
  const s=sd(pid,spd);
  if(!s)return;
  const frac=modeMap[mode]||1;
  const mm=(s.mm*frac).toFixed(1);
  const hrs=(s.hrs*frac).toFixed(1);
  const ha=HECTARES[pid]||0;
  const m3=(s.mm*frac*ha*10).toFixed(0);
  const infoBox=document.getElementById('ps_info_box');
  if(infoBox){
    infoBox.querySelector('div').textContent=`AT ${spd}% — ${mode}`;
  }
  if(document.getElementById('ps_mm'))document.getElementById('ps_mm').textContent=mm+' mm';
  if(document.getElementById('ps_hrs'))document.getElementById('ps_hrs').textContent=hrs+' hrs';
  if(document.getElementById('ps_m3'))document.getElementById('ps_m3').textContent=m3+' m³';
}

function exportData(){
  const exportObj={
    version:2,
    exportedAt:new Date().toISOString(),
    pivots:state.pivots,
    fertRecs:state.fertRecs,
    chemRecs:state.chemRecs,
    schedule:state.schedule,
    dayNotes:state.dayNotes,
    preScheduled:state.preScheduled,
    plantingHistory:state.plantingHistory,
    irrigHistory:state.irrigHistory,
    historyLog:state.historyLog,
    plantDates:PLANT_DATES
  };
  const blob=new Blob([JSON.stringify(exportObj,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='WakaWaka_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.version&&d.pivots){
          if(d.pivots)state.pivots=d.pivots;
          if(d.fertRecs)state.fertRecs=d.fertRecs;
          if(d.chemRecs)state.chemRecs=d.chemRecs;
          if(d.schedule)state.schedule=d.schedule;
          if(d.dayNotes)state.dayNotes=d.dayNotes;
          if(d.preScheduled)state.preScheduled=d.preScheduled;
          if(d.plantingHistory)state.plantingHistory=d.plantingHistory;
          if(d.irrigHistory)state.irrigHistory=d.irrigHistory;
          if(d.historyLog)state.historyLog=d.historyLog;
          if(d.plantDates)Object.assign(PLANT_DATES,d.plantDates);
          saveState();
          renderDashboard();
          if(state.currentPage!=='dashboard')showPage(state.currentPage);
          alert('✅ Data imported successfully!\n'+Object.keys(d).filter(k=>k!=='version'&&k!=='exportedAt').map(k=>`${k}: imported`).join('\n'));
        }else{alert('❌ Invalid backup file');}
      }catch(err){alert('❌ Could not read file: '+err.message);}
    };
    reader.readAsText(file);
  };
  input.click();
}

function renderWeekGrid(){
  const todayIdx=new Date().getDay();
  const todayDay=DAYS[todayIdx===0?6:todayIdx-1];
  // Build grid: rows = pivots that have tasks, cols = days
  const activePivots=PIVOT_NAMES.filter(p=>state.schedule.some(s=>s.pivot===p));
  const allPivots=activePivots.length?activePivots:PIVOT_NAMES.slice(0,8);

  const headerCells=DAYS.map(d=>`<th onclick="setCalDay('${d}')" style="cursor:pointer;${d===todayDay?'color:#4ade80;':''}">
    ${d}<br/><span style="font-size:8px;color:#374151;">${state.schedule.filter(s=>s.day===d&&!s.done).length||''}</span>
  </th>`).join('');

  const rows=allPivots.map(p=>{
    const cells=DAYS.map(d=>{
      const tasks=state.schedule.filter(s=>s.pivot===p&&s.day===d);
      const taskHtml=tasks.map(t=>`<div class="cal-task ${t.type}${t.done?' done':''}" onclick="setCalDay('${d}')" title="${t.product}">
        ${t.type==='spray'?'🧪':'🌱'}${t.product.substring(0,8)}
      </div>`).join('');
      return`<td class="${d===todayDay?'today-col':''}">${taskHtml}</td>`;
    }).join('');
    return`<tr><td class="pivot-label">${p}<br/><span style="color:#6b7280;font-size:9px;">${HECTARES[p]}ha</span></td>${cells}</tr>`;
  }).join('');

  // Summary row - day notes indicator
  const noteRow=DAYS.map(d=>`<td style="text-align:center;">${state.dayNotes[d]?'📝':''}</td>`).join('');

  document.getElementById('pg-calendar').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-size:12px;color:#6b7280;">${state.calWeekLabel}</div>
      <button onclick="openEditWeekLabel()" style="background:none;border:none;color:#60a5fa;font-size:11px;">✏️ Edit week</button>
    </div>
    <div style="overflow-x:auto;margin-bottom:16px;border-radius:10px;border:1px solid #1e3a2f;">
      <table class="cal-grid">
        <thead><tr><th>Pivot</th>${headerCells}</tr></thead>
        <tbody>${rows}
        <tr><td class="pivot-label" style="font-size:9px;color:#6b7280;">Notes</td>${noteRow}</tr>
        </tbody>
      </table>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:#60a5fa;">🧪 Spray</div>
      <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:#facc15;">🌱 Spread</div>
      <div style="margin-left:auto;font-size:11px;color:#6b7280;">Tap a day for details</div>
    </div>
    <div style="font-size:11px;color:#4ade80;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Tap a day to see details & move tasks</div>
    ${DAYS.map(d=>{
      const tasks=state.schedule.filter(s=>s.day===d);
      const done=tasks.filter(t=>t.done).length;
      const isToday=d===todayDay;
      return`<button onclick="setCalDay('${d}')" style="width:100%;background:${isToday?'#0d2018':'#0f2318'};border:1px solid ${isToday?'#4ade80':'#1e3a2f'};border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:14px;font-weight:700;color:${isToday?'#4ade80':'#e5e7eb'}">${d}</span>
          ${state.dayNotes[d]?'<span style="font-size:10px;color:#6b7280;">📝</span>':''}
        </div>
        <div style="text-align:right;">
          <div style="font-size:12px;color:#9ca3af;">${tasks.length} task${tasks.length!==1?'s':''}</div>
          ${done>0?`<div style="font-size:10px;color:#4ade80;">${done} done</div>`:''}
        </div>
      </button>`;
    }).join('')}`;
}

function renderDayView(){
  const d=state.calSelDay;
  const todayIdx=new Date().getDay();
  const todayDay=DAYS[todayIdx===0?6:todayIdx-1];
  const isToday=d===todayDay;
  const tasks=state.schedule.filter(s=>s.day===d);
  const dayIdx=DAYS.indexOf(d);

  const taskCards=tasks.length?tasks.map(t=>{
    const lockout=getSprayLockout(t.pivot);
    const fertPend=getFertWarn(t.pivot);
    const hasConflict=(t.type==='spray'&&lockout)||(t.type==='spread'&&fertPend);
    const moveBtns=DAYS.filter(dd=>dd!==d).map(dd=>`<button class="move-day-btn" onclick="moveTask('${t.id}','${dd}')">${dd}</button>`).join('');
    return`<div class="day-task-card" style="border-color:${t.done?'#2d5a3d':hasConflict?'#7f1d1d':'#1e3a2f'};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">

          ${t.type==='spread'&&!t.done?`<div style="font-size:10px;color:#fb923c;margin-top:2px;">💧 Irrigate 8–10mm on ${t.side} after</div>`:''}
          ${t.type==='spray'&&!t.done?`<div style="font-size:10px;color:#f87171;margin-top:2px;">🔒 24hr lockout after spraying</div>`:''}
        </div>
        <button onclick="toggleSchedDone('${t.id}');renderCalendar();" style="background:${t.done?'#2d5a3d':'#0a1a10'};border:1px solid ${t.done?'#4ade80':'#1e3a2f'};color:${t.done?'#4ade80':'#6b7280'};border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;white-space:nowrap;">${t.done?'✓ Done':'Mark Done'}</button>
      </div>

      <div style="margin-bottom:8px;">
        <div style="font-size:10px;color:#6b7280;margin-bottom:4px;">TASK NOTE</div>
        <textarea onchange="saveTaskNote('${t.id}',this.value)" style="width:100%;background:#0a1a10;border:1px solid #1e3a2f;border-radius:6px;padding:8px;color:#e5e7eb;font-size:12px;resize:none;height:50px;">${t.note||''}</textarea>

}

function saveTaskNote(taskId, note){
  state.schedule=state.schedule.map(s=>s.id===taskId?{...s,note}:s);
}

function saveDiaryNote(day, note){
  state.dayNotes[day]=note;
}

function moveTask(taskId, newDay){
  const task=state.schedule.find(s=>s.id===taskId);
  if(!task)return;
  // Check conflicts
  const lockout=getSprayLockout(task.pivot);
  const fertPend=getFertWarn(task.pivot);
  const hasConflict=(task.type==='spray'&&lockout)||(task.type==='spread'&&fertPend);
  if(hasConflict){
    showWarn(
      '⚠️ Scheduling Conflict',
      `Moving ${task.pivot} ${task.type} to ${newDay}.

${lockout?`Spray lockout: ${lockout.hoursLeft}h remaining.`:''}${fertPend?`Fertilizer needs irrigation first.`:''}

Move anyway?`,
      ()=>{doMoveTask(taskId,newDay);}
    );
  } else {
    doMoveTask(taskId,newDay);
  }
}

function doMoveTask(taskId, newDay){
  state.schedule=state.schedule.map(s=>s.id===taskId?{...s,day:newDay}:s);
  logHistory(state.schedule.find(s=>s.id===taskId)?.pivot||'','Task Moved',`Moved to ${newDay}`);
  state.calSelDay=newDay;
  renderCalendar();
  renderDashboard();
}

  document.getElementById('modalContent').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div style="font-size:18px;font-weight:800;color:#e5e7eb;">Add Task — ${day}</div>
      <button onclick="closeModal()" style="background:#1e3a2f;border:none;color:#9ca3af;border-radius:8px;padding:6px 14px;font-size:16px;">✕</button>
    </div>
    <div class="inp-label">Pivot</div><select class="inp-field" id="sc_pivot">${pivotOpts}</select>
    <div class="inp-label">Type</div>
    <select class="inp-field" id="sc_type"><option value="spray">Spray</option><option value="spread">Spread (Fertilizer)</option></select>

    <button class="btn btn-purple" onclick="saveSchedForDay('${day}')">Add Task</button>`;
  document.getElementById('mainModal').classList.add('open');

function saveSchedForDay(day){
  state.schedule.push({
    id:'s'+Date.now(),
    pivot:document.getElementById('sc_pivot').value,
    day:day,
    type:document.getElementById('sc_type').value,
    product:document.getElementById('sc_product').value||'Unknown',

function checkPreSchedAlerts(){
  const now=Date.now();
  state.preScheduled.forEach(s=>{
    if(s.notified)return;
    const t=new Date(s.scheduledTime).getTime();
    const diff=(t-now)/60000; // minutes until
    if(diff<=60&&diff>55){
      alert(`⏰ REMINDER: ${s.pivot} irrigation scheduled in 1 hour\n${new Date(s.scheduledTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · ${s.mode} · ${s.speed}%${s.note?' · '+s.note:''}`);
    } else if(diff<=0&&diff>-5){
      s.notified=true;
      alert(`🚿 TIME TO START: ${s.pivot} irrigation\nScheduled for ${new Date(s.scheduledTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · ${s.mode} · ${s.speed}%${s.note?' · '+s.note:''}`);
      renderDashboard();
    }
  });
}

// ─── AI CALENDAR SCAN ─────────────────────────────────────────
async function handleCalPhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async(ev)=>{
    const dataUrl=ev.target.result;
    state.calPhotos.push({dataUrl,weekLabel:'Week of '+new Date().toLocaleDateString('en-ZA'),uploadedAt:new Date().toISOString()});
    await scanPhoto(dataUrl);
    state.planTab='week';
    renderPlanner();
  };
  reader.readAsDataURL(file);
}

async function rescanPhoto(idx){
  await scanPhoto(state.calPhotos[idx].dataUrl);
  state.planTab='week';
  renderPlanner();
}

async function scanPhoto(dataUrl){
  state.aiLoading=true;renderPlanner();
  try{
    const base64=dataUrl.split(',')[1];
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},
          {type:'text',text:'This is a farm work calendar. Extract all spray and fertilizer spreading applications. Return ONLY a JSON array, no markdown, no explanation. Each item: {"pivot":"P4","day":"Mon","type":"spray","product":"Fungicide X","side":"Full Circle"}. type must be "spray" or "spread". day must be Mon/Tue/Wed/Thu/Fri/Sat/Sun. side must be Top Side, Bottom Side, or Full Circle.'}
        ]}]
      })
    });
    const data=await resp.json();
    const text=(data.content||[]).map(i=>i.text||'').join('');
    const clean=text.replace(/```json|```/g,'').trim();
    const items=JSON.parse(clean);
    items.forEach((item,i)=>{
      state.schedule.push({
        id:'ai'+Date.now()+'_'+i,
        pivot:item.pivot||'P0',day:item.day||'Mon',
        type:item.type||'spray',product:item.product||'Unknown',
        side:item.side||'Full Circle',done:false,irrigated:false
      });
    });
  }catch(err){
    alert('Could not read calendar automatically. You can add entries manually using "+ Add Entry".');
  }finally{
    state.aiLoading=false;
  }
}

function closeModal(){document.getElementById('mainModal').classList.remove('open');}
function closeModalIfBg(e){if(e.target===document.getElementById('mainModal'))closeModal();}

function showWarn(title,msg,onProceed){
  document.getElementById('warnContent').innerHTML=`
    <div style="font-size:18px;font-weight:800;color:#f87171;margin-bottom:12px;">${title}</div>
    <div style="font-size:14px;color:#e5e7eb;line-height:1.6;margin-bottom:20px;white-space:pre-line;">${msg}</div>
    <div style="display:flex;gap:10px;">
      <button onclick="closeWarn()" style="flex:1;padding:12px;background:#0a1a10;border:1px solid #1e3a2f;border-radius:10px;color:#9ca3af;font-weight:700;font-size:14px;">Cancel</button>
      <button onclick="warnProceed()" style="flex:1;padding:12px;background:#7f1d1d;border:none;border-radius:10px;color:#fff;font-weight:700;font-size:14px;">Proceed Anyway</button>
    </div>`;
  window._warnProceed=onProceed;
  document.getElementById('warnModal').classList.add('open');
}
function warnProceed(){if(window._warnProceed)window._warnProceed();closeWarn();}
function closeWarn(){document.getElementById('warnModal').classList.remove('open');}

// ── localStorage persistence ──────────────────────────────────
const SAVE_KEYS=['pivots','fertRecs','chemRecs','schedule','calPhotos','dayNotes','preScheduled','plantingHistory','historyLog','irrigHistory'];
function saveState(){
  try{
    SAVE_KEYS.forEach(k=>{
      if(state[k]!==undefined) localStorage.setItem('ww_'+k,JSON.stringify(state[k]));
    });
    // Save PLANT_DATES separately
    localStorage.setItem('ww_plantDates',JSON.stringify(PLANT_DATES));
  }catch(e){console.warn('Save error',e);}
}

function loadState(){
  try{
    SAVE_KEYS.forEach(k=>{
      const v=localStorage.getItem('ww_'+k);
      if(v){try{state[k]=JSON.parse(v);}catch(e){}}
    });
    const pd=localStorage.getItem('ww_plantDates');
    if(pd){try{const d=JSON.parse(pd);Object.assign(PLANT_DATES,d);}catch(e){}}
  }catch(e){console.warn('Load error',e);}
}

// Auto-save every 30s and on page hide
loadState();
setInterval(saveState,30000);
document.addEventListener('visibilitychange',()=>{if(document.hidden)saveState();});
window.addEventListener('beforeunload',saveState);

document.getElementById('dateDisplay').textContent=new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'});
