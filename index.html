const MF={"Full Circle":1,"Top Side":0.5,"Bottom Side":0.5,"Top Left Quarter":0.25,"Top Right Quarter":0.25,"Bottom Left Quarter":0.25,"Bottom Right Quarter":0.25,"Top Left Eighth":0.125,"Top Right Eighth":0.125,"Upper Right Eighth":0.125,"Lower Right Eighth":0.125,"Bottom Right Eighth":0.125,"Bottom Left Eighth":0.125,"Lower Left Eighth":0.125,"Upper Left Eighth":0.125};
const C={bg:"#070f09",card:"#0f2318",cb:"#1e3a2f",deep:"#0a1a10",g:"#4ade80",y:"#facc15",b:"#60a5fa",p:"#a78bfa",o:"#fb923c",r:"#f87171",t:"#e5e7eb",m:"#9ca3af",d:"#6b7280",f:"#374151"};

function gsd(id,spd){return SD[id]?SD[id][spd]||null:null;}

function cp(pivot){
  if(!pivot.active||!pivot.startTime||!pivot.speed)return null;
  const s=gsd(pivot.id,pivot.speed);if(!s)return null;
  const frac=MF[pivot.mode]||1;
  const totalHrs=s.hrs*frac;
  let start=new Date(pivot.startTime);
  if(isNaN(start.getTime()))return null;
  const el=(Date.now()-start.getTime())/3600000;
  if(isNaN(el)||el<0)return null;
  const pct=Math.min(100,(el/totalHrs)*100);
  return{pct,el,totalHrs,rem:Math.max(0,totalHrs-el),
    finish:new Date(start.getTime()+totalHrs*3600000),
    mm:s.mm*frac};
}

function Circle({pct,mode,size=80,active,warn}){
  const cx=size/2,cy=size/2,r=size*0.38,sw=size*0.13;
  const circ=2*Math.PI*r;
  const frac=MF[mode]||1;
  const rotMap={"Full Circle":-90,"Top Side":-90,"Bottom Side":90,"Top Left Quarter":180,"Top Right Quarter":-90,"Bottom Left Quarter":90,"Bottom Right Quarter":0,"Top Left Eighth":-180,"Top Right Eighth":-90,"Upper Right Eighth":-45,"Lower Right Eighth":0,"Bottom Right Eighth":45,"Bottom Left Eighth":90,"Lower Left Eighth":135,"Upper Left Eighth":180};
  const rot=rotMap[mode]!=null?rotMap[mode]:-90;
  const totalArc=circ*frac,filledArc=totalArc*(pct/100);
  const tc=warn?"#7f1d1d":C.cb,rc=warn?"#450a0a":"#2d5a3d",fc=warn?C.r:C.g;
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={tc} strokeWidth={sw}/>
      {active&&<circle cx={cx} cy={cy} r={r} fill="none" stroke={rc} strokeWidth={sw}
        strokeDasharray={`${totalArc} ${circ}`} strokeLinecap="round" transform={`rotate(${rot} ${cx} ${cy})`}/>}
      {active&&<circle cx={cx} cy={cy} r={r} fill="none" stroke={fc} strokeWidth={sw}
        strokeDasharray={`${filledArc} ${circ}`} strokeLinecap="round" transform={`rotate(${rot} ${cx} ${cy})`}/>}
      {active&&(()=>{
        const angle=(rot+(pct/100)*frac*360)*(Math.PI/180);
        return<line x1={cx} y1={cy} x2={cx+r*Math.cos(angle)} y2={cy+r*Math.sin(angle)}
          stroke={C.y} strokeWidth={size*0.04} strokeLinecap="round"/>;
      })()}
      <circle cx={cx} cy={cy} r={size*0.06} fill={active?(warn?C.r:C.g):C.f}/>
    </svg>
  );
}

      if(saved){

        if(d.pivots)setPivots(d.pivots);
        if(d.fertRecs)setFertRecs(d.fertRecs);
        if(d.chemRecs)setChemRecs(d.chemRecs);
        if(d.sched)setSched(d.sched);
        if(d.photos)setPhotos(d.photos);
        if(d.irrigHist)setIrrigHist(d.irrigHist);
      }
    }catch(e){}
    const tick=setInterval(()=>setTick(t=>t+1),30000);
    return()=>clearInterval(tick);
  },[]);

  const save=(ps,fr,cr,sc,ph,ih)=>{
    try{localStorage.setItem("ww_state",JSON.stringify({pivots:ps,fertRecs:fr,chemRecs:cr,sched:sc,photos:ph,irrigHist:ih||irrigHist}));}catch(e){}
  };

  const upd=(id,ch)=>{
    const nps=pivots.map(p=>p.id===id?{...p,...ch}:p);
    setPivots(nps);save(nps,fertRecs,chemRecs,sched,photos);
  };

  function getLockout(pid){
    const sp=chemRecs.filter(r=>r.pivot===pid&&r.sprayTime);
    if(!sp.length)return null;
    const lt=sp.sort((a,b)=>new Date(b.sprayTime)-new Date(a.sprayTime))[0];
    const lh=lt.lockoutHrs!==undefined?lt.lockoutHrs:24;
    if(lh===0)return null;
    const el=(Date.now()-new Date(lt.sprayTime).getTime())/3600000;
    if(el<lh)return{h:(lh-el).toFixed(1),lh};
    return null;
  }

  function getFertWarn(pid){
    const p=fertRecs.filter(r=>r.pivot===pid&&!r.irrigated);
    return p.length?p[p.length-1]:null;
  }

  function startIrrig(pivotId,data){
    const lock=getLockout(pivotId);
    const fw=getFertWarn(pivotId);
    if(lock){
      setWarn({title:"⚠️ Spray Lockout",msg:`${pivotId}: ${lock.h}h lockout remaining.\nProceed anyway?`,
        go:()=>{doStart(pivotId,data);setWarn(null);}});
    } else if(fw){
      setWarn({title:"⚠️ Fertilizer Not Irrigated",msg:`${pivotId} has ${fw.product} that needs 8-10mm irrigation on ${fw.side}.\nProceed?`,
        go:()=>{doStart(pivotId,data);setWarn(null);}});
    } else doStart(pivotId,data);
  }

  function doStart(pid,data){
    const nps=pivots.map(p=>p.id===pid?{...p,active:true,startTime:data.startTime,speed:parseInt(data.speed),mode:data.mode}:p);
    setPivots(nps);
    const nfr=fertRecs.map(r=>{
      if(r.pivot===pid&&!r.irrigated){
        const m=data.mode==="Full Circle"||(r.side&&data.mode.includes(r.side.split(" ")[0]));
        return m?{...r,irrigated:true,irrigatedAt:new Date().toISOString()}:r;
      }
      return r;
    });
    setFertRecs(nfr);
    save(nps,nfr,chemRecs,sched,photos,irrigHist);
    setModal(null);setForm({});
  }

  function stopIrrig(pid){
    const pivot=pivots.find(p=>p.id===pid);
    if(pivot){
      const pr=cp(pivot);
      if(pr&&pr.pct>0&&pr.el>0){
        const ha=HA[pid]||0;
        const mmApp=Math.max(0,pr.mm*pr.pct/100);
        const m3=Math.max(0,mmApp*ha*10);
        const now=new Date();
        const month=now.getMonth();
        const season=month>=3&&month<=8?"Autumn/Winter":"Spring/Summer";
        const entry={id:`ih${Date.now()}`,startTime:pivot.startTime,stopTime:now.toISOString(),
          mode:pivot.mode,speed:pivot.speed,pct:pr.pct.toFixed(1),
          mmApplied:mmApp.toFixed(1),m3:m3.toFixed(0),season};
        const nih={...irrigHist,[pid]:[entry,...(irrigHist[pid]||[])]};
        setIrrigHist(nih);
        const nps=pivots.map(p=>p.id===pid?{...p,active:false,startTime:null}:p);
        setPivots(nps);save(nps,fertRecs,chemRecs,sched,photos,nih);
        return;
      }
    }
    const nps=pivots.map(p=>p.id===pid?{...p,active:false,startTime:null}:p);
    setPivots(nps);save(nps,fertRecs,chemRecs,sched,photos,irrigHist);
  }

        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
            {type:"text",text:`Farm spray/fertilizer calendar. Extract ALL tasks. Return ONLY valid JSON array, no markdown. Fields: pivot(e.g."P4"), day("Mon"/"Tue"/"Wed"/"Thu"/"Fri"/"Sat"/"Sun"), type("spray" or "spread"), product(string), side("Full Circle"/"Top Side"/"Bottom Side"/"Top Left Quarter" etc), chemicals([{prod,rate,unit}] for sprays). Example: [{"pivot":"P5","day":"Mon","type":"spray","product":"Spray 4","side":"Bottom Side","chemicals":[{"prod":"Albuff","rate":0.2,"unit":"L/ha"},{"prod":"ActiveCalp","rate":1.0,"unit":"L/ha"}]},{"pivot":"P3","day":"Tue","type":"spread","product":"NPK 34 200kg/ha","side":"Full Circle","chemicals":[]}]`}
          ]}]})
      });
      const data=await resp.json();
      const txt=data.content.map(i=>i.text||"").join("");
      const items=JSON.parse(txt.replace(/```json|```/g,"").trim());
      const ne=items.map((it,i)=>({
        id:`ai${Date.now()}_${i}`,pivot:it.pivot||"P0",day:it.day||"Mon",
        type:it.type||"spray",product:it.product||"Unknown",
        side:it.side||"Full Circle",chemicals:it.chemicals||[],done:false,irrigated:false
      }));
      const ns=[...sched,...ne];
      setSched(ns);save(pivots,fertRecs,chemRecs,ns,photos,irrigHist);
      return ne.length;
    }catch(e){
      setAiErr("Could not read calendar. Try a clearer photo.");return 0;
    }finally{setAiLoad(false);}
  }

  const inp=(label,key,type="text",opts=null)=>(
    <div key={key} style={{marginBottom:12}}>
      <div style={{fontSize:11,color:C.d,marginBottom:4,textTransform:"uppercase",letterSpacing:0.8}}>{label}</div>
      {opts?(
        <select value={form[key]||""} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))}
          style={{width:"100%",background:C.deep,border:`1px solid ${C.cb}`,borderRadius:8,padding:"10px 12px",color:C.t,fontSize:14}}>
          {opts.map(o=><option key={o} value={o}>{o}</option>)}
        </select>
      ):(
        <input type={type} value={form[key]||""} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))}
          style={{width:"100%",background:C.deep,border:`1px solid ${C.cb}`,borderRadius:8,padding:"10px 12px",color:C.t,fontSize:14,boxSizing:"border-box"}}/>
      )}
    </div>
  );

  // ─── WARN MODAL ──────────────────────────────────────────────────────────────
  const WarnModal=()=>{
    if(!warn)return null;
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>

            <button onClick={()=>setWarn(null)} style={{flex:1,padding:12,background:C.deep,border:`1px solid ${C.cb}`,borderRadius:10,color:C.m,fontWeight:700,cursor:"pointer"}}>Cancel</button>
            <button onClick={warn.go} style={{flex:1,padding:12,background:"#7f1d1d",border:"none",borderRadius:10,color:C.t,fontWeight:700,cursor:"pointer"}}>Proceed Anyway</button>

  // ─── MAIN MODAL ──────────────────────────────────────────────────────────────
  const Modal=()=>{
    if(!modal)return null;
    const isStart=modal==="start";
    const isFert=modal==="fert"||modal==="fertG";
    const isChem=modal==="chem"||modal==="chemG";
    const isGlobal=modal==="fertG"||modal==="chemG";
    const isSched=modal==="sched";
    const s=isStart?gsd(form.pivotId,parseInt(form.speed)):null;
    const lock=isStart?getLockout(form.pivotId):null;

    const submit=()=>{
      if(isStart){startIrrig(form.pivotId,form);}
      else if(isFert){
        const pid=isGlobal?form.pivot:sel;
        const rate=parseFloat(form.rate)||0;
        const ha=HA[pid]||0;
        const totalKg=form.totalKg||(rate>0?(rate*ha).toFixed(0):"—");
        const nfr=[...fertRecs,{id:`f${Date.now()}`,pivot:pid,date:form.date,product:form.product,rate,totalKg,side:form.side||"Full Circle",operator:form.operator,notes:form.notes,needsIrrigation:true,irrigated:false,spreadAt:new Date().toISOString()}];
        setFertRecs(nfr);save(pivots,nfr,chemRecs,sched,photos,irrigHist);
      }else if(isChem){
        const pid=isGlobal?form.pivot:sel;
        const ncr=[...chemRecs,{id:`c${Date.now()}`,pivot:pid,date:form.date,product:form.product,type:form.type,rate:form.rate,waterVol:form.waterVol,operator:form.operator,notes:form.notes,lockoutHrs:parseFloat(form.lockHrs)||24,sprayTime:new Date().toISOString()}];
        setChemRecs(ncr);save(pivots,fertRecs,ncr,sched,photos,irrigHist);
      }else if(isSched){
        const ns=[...sched,{id:`s${Date.now()}`,pivot:form.pivot||"P0",day:form.day||"Mon",type:form.schedType||"spray",product:form.product||"",side:form.side||"Full Circle",chemicals:[],done:false}];
        setSched(ns);save(pivots,fertRecs,chemRecs,ns,photos,irrigHist);
      }
      setModal(null);setForm({});
    };

    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:200,display:"flex",alignItems:"flex-end"}}
        onClick={e=>{if(e.target===e.currentTarget){setModal(null);setForm({});}}}>
        <div style={{background:"#0d1f14",borderRadius:"20px 20px 0 0",width:"100%",padding:"20px 20px 48px",maxHeight:"88vh",overflowY:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div style={{fontSize:18,fontWeight:800,color:C.t}}>
              {isStart?`Start ${form.pivotId}`:isFert?"Fertilizer Record":isChem?"Chemical Record":"Add Task"}
            </div>
            <button onClick={()=>{setModal(null);setForm({});}} style={{background:C.cb,border:"none",color:C.m,borderRadius:8,padding:"6px 14px",fontSize:16}}>✕</button>
          </div>

          {isStart&&<>
            {inp("Pivot","pivotId","text",PN)}
            {inp("Start Time","startTime","datetime-local")}
            {inp("Speed %","speed","text",SPD.map(String))}
            {inp("Mode","mode","text",MODES)}
            {s&&<div style={{background:C.deep,borderRadius:10,padding:12,marginBottom:12}}>
              <div style={{fontSize:11,color:C.g,marginBottom:6}}>AT {form.speed}% SPEED</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div><div style={{color:C.t,fontWeight:700}}>{s.mm} mm</div><div style={{fontSize:10,color:C.d}}>per revolution</div></div>
                <div><div style={{color:C.t,fontWeight:700}}>{(s.hrs*(MF[form.mode]||1)).toFixed(1)} hrs</div><div style={{fontSize:10,color:C.d}}>total runtime</div></div>
              </div>
            </div>}
            {lock&&<div style={{background:"#1a0a0a",border:"1px solid #7f1d1d",borderRadius:10,padding:10,marginBottom:12}}>
              <div style={{fontSize:12,color:C.r,fontWeight:700}}>⚠️ Spray lockout: {lock.h}h remaining</div>
            </div>}
          </>}

          {isFert&&<>
            {isGlobal&&inp("Pivot","pivot","text",PN)}
            {inp("Date","date","date")}
            {inp("Product","product")}
            {inp("Spread Side","side","text",MODES)}
            {inp("Rate (kg/ha)","rate","number")}
            {(()=>{const pid=isGlobal?form.pivot:sel;const ha=HA[pid]||0;const rate=parseFloat(form.rate)||0;const kg=rate>0?(rate*ha).toFixed(0):null;
              return<div style={{background:C.deep,borderRadius:10,padding:"10px 12px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:11,color:C.d}}>{pid} = <span style={{color:C.b,fontWeight:700}}>{ha} ha</span></div>
                {kg&&<div style={{fontSize:14,fontWeight:800,color:C.y}}>{kg} kg total</div>}
              </div>;})()}
            {inp("Total kg — override","totalKg","number")}
            {inp("Operator","operator")}
            {inp("Notes","notes")}
            <div style={{background:"#1a0f00",border:"1px solid #854d0e",borderRadius:10,padding:10,marginBottom:12}}>
              <div style={{fontSize:12,color:C.y}}>⚠️ Irrigate 8–10mm on {form.side||"selected"} side after spreading.</div>
            </div>
          </>}

          {isChem&&<>
            {isGlobal&&inp("Pivot","pivot","text",PN)}
            {inp("Date","date","date")}
            {inp("Product","product")}
            {inp("Type","type","text",["Fungicide","Insecticide","Herbicide","Foliar Fertilizer","Wetting Agent","Biological"])}
            {inp("Application Rate","rate")}
            {inp("Water Volume (L/ha)","waterVol","number")}
            {inp("Operator","operator")}
            {inp("Notes","notes")}
            {inp("🔒 Lockout Hours (0 = no lockout)","lockHrs","number")}
            <div style={{background:"#1a0a0a",border:"1px solid #7f1d1d",borderRadius:10,padding:10,marginBottom:12}}>
              <div style={{fontSize:12,color:C.r}}>Default 24h lockout. Set 0 to disable.</div>
            </div>
          </>}

          {isSched&&<>
            {inp("Pivot","pivot","text",PN)}
            {inp("Day","day","text",DAYS)}
            {inp("Type","schedType","text",["spray","spread"])}
            {inp("Product / Description","product")}
            {inp("Side","side","text",MODES)}
          </>}

          <button onClick={submit} style={{width:"100%",background:isStart?C.g:isFert?C.y:isChem?C.b:C.p,color:C.bg,border:"none",borderRadius:12,padding:14,fontWeight:800,fontSize:16,cursor:"pointer",marginTop:4}}>
            {isStart?"Start Irrigation":"Save"}
          </button>
        </div>
      </div>
    );
  };

  // ─── EDIT SCHEDULE MODAL ─────────────────────────────────────────────────────
  const EditSched=()=>{
    const [chems,setChems]=useState(editSched?[...(editSched.chemicals||[])]:[]);
    if(!editSched)return null;
    const [ef,setEf]=useState({...editSched});

    const addChem=()=>setChems(c=>[...c,{prod:"",rate:"",unit:"L/ha",lockout:24}]);
    const updChem=(i,k,v)=>setChems(c=>c.map((ch,idx)=>idx===i?{...ch,[k]:v}:ch));
    const delChem=(i)=>setChems(c=>c.filter((_,idx)=>idx!==i));

    const saveEdit=()=>{
      const updated={...ef,chemicals:chems.filter(c=>c.prod)};
      const ns=sched.map(s=>s.id===editSched.id?updated:s);
      setSched(ns);save(pivots,fertRecs,chemRecs,ns,photos,irrigHist);
      setEditSched(null);
    };

    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:200,display:"flex",alignItems:"flex-end"}}
        onClick={e=>{if(e.target===e.currentTarget)setEditSched(null);}}>
        <div style={{background:"#0d1f14",borderRadius:"20px 20px 0 0",width:"100%",padding:"20px 20px 48px",maxHeight:"90vh",overflowY:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontSize:18,fontWeight:800,color:C.t}}>✏️ Edit Task</div>
            <button onClick={()=>setEditSched(null)} style={{background:C.cb,border:"none",color:C.m,borderRadius:8,padding:"6px 14px",fontSize:16}}>✕</button>
          </div>

          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:C.d,marginBottom:4,textTransform:"uppercase"}}>Day</div>
            <select value={ef.day} onChange={e=>setEf(f=>({...f,day:e.target.value}))} style={{width:"100%",background:C.deep,border:`1px solid ${C.cb}`,borderRadius:8,padding:"10px 12px",color:C.t,fontSize:14}}>
              {DAYS.map(d=><option key={d}>{d}</option>)}
            </select>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:C.d,marginBottom:4,textTransform:"uppercase"}}>Side / Mode</div>
            <select value={ef.side} onChange={e=>setEf(f=>({...f,side:e.target.value}))} style={{width:"100%",background:C.deep,border:`1px solid ${C.cb}`,borderRadius:8,padding:"10px 12px",color:C.t,fontSize:14}}>
              {MODES.map(m=><option key={m}>{m}</option>)}
            </select>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:C.d,marginBottom:4,textTransform:"uppercase"}}>Description</div>
            <input value={ef.product} onChange={e=>setEf(f=>({...f,product:e.target.value}))} style={{width:"100%",background:C.deep,border:`1px solid ${C.cb}`,borderRadius:8,padding:"10px 12px",color:C.t,fontSize:14,boxSizing:"border-box"}}/>
          </div>

          {ef.type==="spray"&&<>
            <div style={{fontSize:11,color:C.d,marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>Chemicals & Rates</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 65px 55px 28px",gap:3,marginBottom:4}}>
              {["Product","Rate","Unit",""].map(h=><div key={h} style={{fontSize:10,color:C.d}}>{h}</div>)}
            </div>
            {chems.map((ch,i)=>(
              <div key={i} style={{background:C.deep,border:`1px solid ${C.cb}`,borderRadius:8,padding:8,marginBottom:6}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 65px 55px 28px",gap:3,marginBottom:4,alignItems:"center"}}>
                  <input value={ch.prod} onChange={e=>updChem(i,"prod",e.target.value)} placeholder="Product" style={{background:"transparent",border:"none",borderBottom:`1px solid ${C.cb}`,color:C.t,fontSize:12,padding:"4px 0"}}/>
                  <input type="number" value={ch.rate} onChange={e=>updChem(i,"rate",e.target.value)} placeholder="Rate" style={{background:"transparent",border:"none",borderBottom:`1px solid ${C.cb}`,color:C.t,fontSize:12,padding:"4px 0"}}/>
                  <select value={ch.unit||"L/ha"} onChange={e=>updChem(i,"unit",e.target.value)} style={{background:C.deep,border:`1px solid ${C.cb}`,borderRadius:4,color:C.t,fontSize:10,padding:"2px"}}>
                    {["L/ha","ml/ha","kg/ha","g/ha"].map(u=><option key={u}>{u}</option>)}
                  </select>
                  <button onClick={()=>delChem(i)} style={{background:"#7f1d1d",border:"none",color:C.r,borderRadius:6,padding:4,fontSize:12}}>✕</button>

                  <input type="number" value={ch.lockout!==undefined?ch.lockout:24} onChange={e=>updChem(i,"lockout",parseFloat(e.target.value)||0)} min="0" max="168" style={{width:50,background:"transparent",border:`1px solid ${C.cb}`,borderRadius:4,color:C.t,fontSize:12,padding:"2px 4px"}}/>
                  <span style={{fontSize:10,color:C.d}}>(0 = no lockout)</span>
                </div>
              </div>
            ))}
            <button onClick={addChem} style={{width:"100%",background:C.deep,border:`1px dashed ${C.g}`,color:C.g,borderRadius:8,padding:8,fontSize:12,marginBottom:8,cursor:"pointer"}}>+ Add Chemical</button>

            <div style={{marginBottom:10}}>
              <div style={{fontSize:11,color:C.d,marginBottom:4,textTransform:"uppercase"}}>Water Rate (L/ha)</div>

              <input value={ef.fertRate||""} onChange={e=>setEf(f=>({...f,fertRate:e.target.value}))} style={{width:"100%",background:C.deep,border:`1px solid ${C.cb}`,borderRadius:8,padding:"10px 12px",color:C.t,fontSize:14,boxSizing:"border-box"}}/>

            <div style={{fontSize:11,color:C.d,marginBottom:4,textTransform:"uppercase"}}>📝 Actuals</div>

          <button onClick={saveEdit} style={{width:"100%",background:C.p,color:C.bg,border:"none",borderRadius:12,padding:14,fontWeight:800,fontSize:16,cursor:"pointer",marginBottom:8}}>💾 Save Changes</button>
          <button onClick={()=>{const ns=sched.filter(s=>s.id!==editSched.id);setSched(ns);save(pivots,fertRecs,chemRecs,ns,photos,irrigHist);setEditSched(null);}} style={{width:"100%",background:"#7f1d1d",color:C.t,border:"none",borderRadius:12,padding:12,fontWeight:700,fontSize:14,cursor:"pointer"}}>🗑 Delete Task</button>
        </div>
      </div>
    );
  };

  // ─── TANK CALCULATOR ─────────────────────────────────────────────────────────
  const TankCalc=()=>{
    if(!tankTask)return null;
    const task=sched.find(s=>s.id===tankTask);
    if(!task)return null;
    const ha=HA[task.pivot]||52;
    const frac=MF[task.side]||1;
    const totalHa=ha*frac;
    const wr=task.waterRate||200;
    const chems=task.chemicals||[];
    const haPerTank=tankSize/wr;
    const numTanks=Math.ceil(totalHa/haPerTank);
    const lastHa=totalHa-(numTanks-1)*haPerTank;

    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:200,display:"flex",alignItems:"flex-end"}}
        onClick={e=>{if(e.target===e.currentTarget){setTankTask(null);setTankTicks({});}}}>
        <div style={{background:"#0d1f14",borderRadius:"20px 20px 0 0",width:"100%",padding:"20px 20px 48px",maxHeight:"90vh",overflowY:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:16,fontWeight:800,color:C.t}}>🧮 Tank Calc — {task.pivot}</div>
            <button onClick={()=>{setTankTask(null);setTankTicks({});}} style={{background:C.cb,border:"none",color:C.m,borderRadius:8,padding:"6px 14px",fontSize:16}}>✕</button>
          </div>

          <div style={{background:C.deep,borderRadius:10,padding:10,marginBottom:12}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,textAlign:"center"}}>
              <div><div style={{fontSize:16,fontWeight:800,color:C.g}}>{totalHa.toFixed(1)}</div><div style={{fontSize:9,color:C.d}}>ha</div></div>
              <div><div style={{fontSize:16,fontWeight:800,color:C.b}}>{wr}</div><div style={{fontSize:9,color:C.d}}>L/ha</div></div>
              <div><div style={{fontSize:16,fontWeight:800,color:C.y}}>{tankSize}</div><div style={{fontSize:9,color:C.d}}>Tank L</div></div>
              <div><div style={{fontSize:16,fontWeight:800,color:C.p}}>{numTanks}</div><div style={{fontSize:9,color:C.d}}>Tanks</div></div>
            </div>
          </div>

          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:11,color:C.d,whiteSpace:"nowrap"}}>Tank size:</div>
            <input type="number" value={tankSize} onChange={e=>setTankSize(parseFloat(e.target.value)||2000)} style={{flex:1,background:C.deep,border:`1px solid ${C.cb}`,borderRadius:8,padding:"8px 12px",color:C.t,fontSize:14}}/>
            <div style={{fontSize:11,color:C.d}}>L</div>
            <button onClick={()=>setTankTicks({})} style={{background:C.deep,border:`1px solid ${C.cb}`,color:C.m,borderRadius:8,padding:"8px 10px",fontSize:11,cursor:"pointer"}}>↺ Reset</button>
          </div>

          {!chems.length&&<div style={{background:"#2d1000",border:"1px solid #854d0e",borderRadius:10,padding:16,textAlign:"center"}}>
            <div style={{fontSize:14,color:C.y,fontWeight:700,marginBottom:6}}>🧪 No chemicals added yet</div>
            <div style={{fontSize:12,color:C.m}}>Edit this task (✏️) to add chemicals and rates first.</div>
          </div>}

          {chems.length>0&&Array.from({length:numTanks},(_, ti)=>{
            const thisHa=ti===numTanks-1?lastHa:haPerTank;
            const allTicked=chems.every((_,ci)=>tankTicks[`${ti}_${ci}`]);
            return(
              <div key={ti} style={{background:allTicked?"#0d2018":"#0f2318",border:`1px solid ${allTicked?C.g:C.cb}`,borderRadius:12,padding:12,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:14,fontWeight:800,color:allTicked?C.g:C.t}}>{allTicked?"✅":"🪣"} Tank {ti+1} of {numTanks}</div>
                  <div style={{fontSize:11,color:C.m}}>{thisHa.toFixed(1)} ha · {(thisHa*wr).toFixed(0)} L water</div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
                  <div>
                    <div style={{fontSize:10,color:C.d,marginBottom:2}}>👤 Driver</div>
                    <input placeholder="Driver name" defaultValue={tankTicks[`driver_${ti}`]||""}
                      onChange={e=>setTankTicks(prev=>({...prev,[`driver_${ti}`]:e.target.value}))}
                      style={{width:"100%",background:C.deep,border:`1px solid ${C.cb}`,borderRadius:6,padding:"6px 8px",color:C.t,fontSize:12,boxSizing:"border-box"}}/>
                  </div>
                  <div>
                    <div style={{fontSize:10,color:C.d,marginBottom:2}}>🕐 Mixed at</div>
                    <input type="time" defaultValue={tankTicks[`time_${ti}`]||""}
                      onChange={e=>setTankTicks(prev=>({...prev,[`time_${ti}`]:e.target.value}))}
                      style={{width:"100%",background:C.deep,border:`1px solid ${C.cb}`,borderRadius:6,padding:"6px 8px",color:C.t,fontSize:12,boxSizing:"border-box"}}/>
                  </div>
                </div>

                  return(
                    <div key={ci} onClick={()=>setTankTicks(prev=>({...prev,[`${ti}_${ci}`]:!prev[`${ti}_${ci}`]}))}

                      </div>

  };

            <button onClick={()=>fileRef.current.click()} style={{flex:1,background:aiLoad?"#374151":C.g,color:C.bg,border:"none",borderRadius:10,padding:11,fontWeight:800,fontSize:13,cursor:"pointer"}}>
              {aiLoad?<span className="pulse">Reading…</span>:<>📸 Scan Calendar</>}
            </button>
            <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handlePhoto}/>

                    <div key={item.id} style={{background:C.card,border:`1px solid ${item.done?"#1a2e22":C.cb}`,borderRadius:10,padding:"10px 12px",marginBottom:6,opacity:item.done?0.5:1}}>
                      <div style={{display:"flex",alignItems:"flex-start",gap:8}}>

                            style={{background:item.done?"#2d5a3d":C.deep,border:`1px solid ${item.done?C.g:C.cb}`,color:item.done?C.g:C.d,borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>

                          <div style={{display:"flex",gap:3}}>

                            {item.type==="spray"&&<button onClick={()=>{setTankTask(item.id);setTankTicks({});}} style={{background:"#2d2000",border:"1px solid #854d0e",color:C.y,borderRadius:6,padding:"3px 7px",fontSize:11,fontWeight:700,cursor:"pointer"}}>🧮</button>}

  // ─── PIVOT DETAIL ────────────────────────────────────────────────────────────
  const Detail=()=>{
    const pivot=pivots.find(p=>p.id===sel);

    const lock=getLockout(pivot.id);const fw=getFertWarn(pivot.id);

    const pChem=chemRecs.filter(r=>r.pivot===pivot.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const pSched=sched.filter(s=>s.pivot===pivot.id).sort((a,b)=>DAYS.indexOf(a.day)-DAYS.indexOf(b.day));

    return(
      <div style={{paddingBottom:100}}>

            <button key={k} onClick={()=>setTab(k)} style={{flex:"0 0 auto",padding:"8px 14px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,whiteSpace:"nowrap",background:tab===k?C.g:C.deep,color:tab===k?C.bg:C.d}}>{l}</button>
          ))}
        </div>

        {tab==="irrigation"&&<div>
          {lock&&<div style={{background:"#1a0a0a",border:"1px solid #7f1d1d",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:13,fontWeight:700,color:C.r}}>🔒 Spray Lockout: {lock.h}h remaining</div>
            <button onClick={()=>{const nc=chemRecs.map(r=>r.pivot===pivot.id&&r.sprayTime?{...r,lockoutHrs:0,sprayTime:null}:r);setChemRecs(nc);save(pivots,fertRecs,nc,sched,photos,irrigHist);}} style={{background:"#7f1d1d",border:"none",color:C.r,borderRadius:8,padding:"6px 12px",fontSize:11,cursor:"pointer"}}>✕ Clear</button>

            <div style={{fontSize:12,color:C.y,fontWeight:700}}>💧 Fertilizer pending irrigation on {fw.side}</div>
          </div>}
          {pivot.active&&pr?<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            {[{l:"Progress",v:`${pr.pct.toFixed(1)}%`},{l:"Speed",v:`${pivot.speed}%`},{l:"Elapsed",v:`${pr.el.toFixed(1)} hrs`},{l:"Remaining",v:`${pr.rem.toFixed(1)} hrs`},{l:"Total Runtime",v:`${pr.totalHrs.toFixed(1)} hrs`},{l:"mm Applied",v:`${(pr.mm*pr.pct/100).toFixed(1)} mm`},{l:"Total Water",v:`${((pr.mm*pr.pct/100)*ha*10).toFixed(0)} m³`},{l:"Est. Finish",v:pr.finish.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}].map(s=>(

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>

                        <div style={{fontSize:12,fontWeight:700,color:C.g}}>{h.startTime?new Date(h.startTime).toLocaleDateString("en-ZA",{day:"2-digit",month:"short"}):""}</div>

                      </div>
                      <div style={{fontSize:11,color:C.m}}>{h.mode} · {h.speed}% · {h.pct}% complete</div>
                      <div style={{fontSize:10,color:C.d}}>{h.startTime?new Date(h.startTime).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):""} → {h.stopTime?new Date(h.stopTime).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):""}</div>
                    </div>
                  ))}
                </div>);
              })}
            </>);
          })()}
        </div>}

        {tab==="fertilizer"&&<div>
          <button onClick={()=>{setModal("fert");setForm({date:new Date().toISOString().slice(0,10),side:"Full Circle"});}} style={{width:"100%",background:C.y,color:C.bg,border:"none",borderRadius:10,padding:12,fontWeight:800,fontSize:14,cursor:"pointer",marginBottom:14}}>+ Add Fertilizer Record</button>
          {!pFert.length&&<div style={{color:C.d,textAlign:"center",padding:24}}>No fertilizer records yet</div>}
          {pFert.map((r,i)=>(
            <div key={i} style={{background:C.card,border:`1px solid ${r.needsIrrigation&&!r.irrigated?"#854d0e":C.cb}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontWeight:700,color:C.y,fontSize:14}}>{r.product}</div>
                <div style={{fontSize:11,color:C.d}}>{r.date}</div>
              </div>
              <div style={{fontSize:12,color:C.m,marginTop:2}}>{r.rate} kg/ha · {r.totalKg} kg · {r.side}</div>
              {r.needsIrrigation&&!r.irrigated&&<div style={{fontSize:11,color:C.o,marginTop:2}}>💧 Needs 8–10mm irrigation on {r.side}</div>}
              {r.irrigated&&<div style={{fontSize:11,color:C.g,marginTop:2}}>✓ Irrigated {r.irrigatedAt?new Date(r.irrigatedAt).toLocaleDateString("en-ZA"):""}</div>}
              {r.operator&&<div style={{fontSize:11,color:C.d}}>👤 {r.operator}</div>}
            </div>
          ))}
        </div>}

        {tab==="chemical"&&<div>
          <button onClick={()=>{setModal("chem");setForm({date:new Date().toISOString().slice(0,10),type:"Fungicide",lockHrs:"24"});}} style={{width:"100%",background:C.b,color:C.bg,border:"none",borderRadius:10,padding:12,fontWeight:800,fontSize:14,cursor:"pointer",marginBottom:14}}>+ Add Chemical Record</button>
          {!pChem.length&&<div style={{color:C.d,textAlign:"center",padding:24}}>No chemical records yet</div>}
          {pChem.map((r,i)=>{
            const lh=r.lockoutHrs!==undefined?r.lockoutHrs:24;
            const el=r.sprayTime?(Date.now()-new Date(r.sprayTime).getTime())/3600000:999;
            const active=lh>0&&el<lh;
            return(
              <div key={i} style={{background:C.card,border:`1px solid ${active?"#7f1d1d":C.cb}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontWeight:700,color:C.b,fontSize:14}}>{r.product}</div>
                  <div style={{fontSize:11,color:C.d}}>{r.date}</div>
                </div>
                <div style={{fontSize:12,color:C.m,marginTop:2}}>{r.type} · {r.rate}</div>
                <div style={{fontSize:11,color:C.d}}>🔒 Lockout: {lh===0?"None":`${lh}h`}</div>
                {active&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
                  <div style={{fontSize:11,color:C.r}}>🔒 {(lh-el).toFixed(1)}h remaining</div>
                  <button onClick={()=>{const nc=chemRecs.map(rc=>rc.id===r.id?{...rc,lockoutHrs:0,sprayTime:null}:rc);setChemRecs(nc);save(pivots,fertRecs,nc,sched,photos,irrigHist);}} style={{background:"#7f1d1d",border:"none",color:C.r,borderRadius:6,padding:"2px 8px",fontSize:10,cursor:"pointer"}}>✕ Clear</button>
                </div>}
                {r.operator&&<div style={{fontSize:11,color:C.d}}>👤 {r.operator}</div>}
              </div>
            );
          })}
        </div>}

        {tab==="program"&&<div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
            {[{v:pSched.filter(t=>t.type==="spray").length,l:"Sprays",c:C.b},{v:pSched.filter(t=>t.type==="spread").length,l:"Spreads",c:C.y},{v:pSched.filter(t=>t.done).length,l:"Done",c:C.g}].map(({v,l,c},i)=>(
              <div key={i} style={{background:C.deep,borderRadius:10,padding:10,textAlign:"center"}}>
                <div style={{fontSize:20,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:10,color:C.d}}>{l}</div>
              </div>
            ))}
          </div>
          {!pSched.length&&<div style={{color:C.d,textAlign:"center",padding:24}}>No tasks scheduled for {pivot.id}</div>}
          {pSched.map(item=>(
            <div key={item.id} style={{background:C.card,border:`1px solid ${item.done?"#1a2e22":C.cb}`,borderRadius:10,padding:"10px 12px",marginBottom:6,opacity:item.done?0.5:1}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                <span style={{fontSize:16}}>{item.type==="spray"?"🧪":"🌱"}</span>
                <div style={{flex:1}}>
                  <div style={{display:"flex",gap:6,marginBottom:2}}>
                    <span style={{fontSize:13,fontWeight:700,color:item.type==="spray"?C.b:C.y}}>{item.day}</span>
                    <span style={{fontSize:10,color:C.d}}>{item.side?.replace(" Quarter","¼").replace(" Side","½")}</span>
                    {item.done&&<span style={{fontSize:10,color:C.g}}>✓</span>}
                  </div>
                  {item.chemicals&&item.chemicals.length?item.chemicals.map(ch=>(
                    <div key={ch.prod} style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{fontSize:11,color:C.t}}>{ch.prod}</span>
                      <span style={{fontSize:11,color:C.b}}>{ch.rate} {ch.unit}</span>
                    </div>
                  )):<div style={{fontSize:12,color:C.t}}>{item.product}</div>}
                  {item.actualNote&&<div style={{fontSize:11,color:C.o,background:"#2d1000",padding:"2px 6px",borderRadius:4,marginTop:2}}>📝 {item.actualNote}</div>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  <button onClick={()=>{const ns=sched.map(s=>s.id===item.id?{...s,done:!s.done}:s);setSched(ns);save(pivots,fertRecs,chemRecs,ns,photos,irrigHist);}}
                    style={{background:item.done?"#2d5a3d":C.deep,border:`1px solid ${item.done?C.g:C.cb}`,color:item.done?C.g:C.d,borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>{item.done?"✓":"Done"}</button>
                  <button onClick={()=>setEditSched(item)} style={{background:C.deep,border:`1px solid ${C.cb}`,color:C.p,borderRadius:6,padding:"3px 7px",fontSize:11,cursor:"pointer"}}>✏️</button>
                  {item.type==="spray"&&<button onClick={()=>{setTankTask(item.id);setTankTicks({});}} style={{background:"#2d2000",border:"1px solid #854d0e",color:C.y,borderRadius:6,padding:"3px 7px",fontSize:11,cursor:"pointer"}}>🧮</button>}
                </div>
              </div>
            </div>
          ))}
        </div>}
      </div>
    );
  };

  // ─── RECORDS ─────────────────────────────────────────────────────────────────
  const Records=()=>{
    const exportData=()=>{
      const d={version:2,exportedAt:new Date().toISOString(),pivots,fertRecs,chemRecs,sched,photos,irrigHist};
      const a=document.createElement("a");
      a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:"application/json"}));
      a.download=`WakaWaka_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();
    };
    const importData=()=>{
      const i=document.createElement("input");i.type="file";i.accept=".json";
      i.onchange=e=>{
        const reader=new FileReader();
        reader.onload=ev=>{
          try{
            const d=JSON.parse(ev.target.result);
            // Support old backup format (schedule/irrigHistory) and new format (sched/irrigHist)
            const schedData=d.sched||d.schedule||[];
            const fertData=d.fertRecs||[];
            const chemData=d.chemRecs||[];
            const pivData=d.pivots||[];
            const phData=d.photos||d.calPhotos||[];
            const ihData=d.irrigHist||d.irrigHistory||{};
            if(pivData.length)setPivots(pivData);
            if(fertData.length)setFertRecs(fertData);
            if(chemData.length)setChemRecs(chemData);
            if(schedData.length)setSched(schedData);
            if(phData.length)setPhotos(phData);
            if(Object.keys(ihData).length)setIrrigHist(ihData);
            save(pivData.length?pivData:pivots,fertData.length?fertData:fertRecs,chemData.length?chemData:chemRecs,schedData.length?schedData:sched,phData.length?phData:photos,Object.keys(ihData).length?ihData:irrigHist);
            const parts=[];
            if(pivData.length)parts.push(pivData.length+" pivots");
            if(fertData.length)parts.push(fertData.length+" fert records");
            if(chemData.length)parts.push(chemData.length+" chem records");
            if(schedData.length)parts.push(schedData.length+" schedule tasks");
            alert("✅ Imported:\n"+(parts.length?parts.join("\n"):"No matching data found in backup file"));
          }catch(err){alert("❌ Could not read file: "+err.message);}
        };
        reader.readAsText(e.target.files[0]);
      };i.click();
    };
    return(
      <div style={{paddingBottom:100}}>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <button onClick={exportData} style={{flex:1,background:C.deep,border:`1px solid ${C.cb}`,color:C.g,borderRadius:10,padding:10,fontWeight:700,fontSize:12,cursor:"pointer"}}>📤 Export Data</button>
          <button onClick={importData} style={{flex:1,background:C.deep,border:`1px solid ${C.cb}`,color:C.b,borderRadius:10,padding:10,fontWeight:700,fontSize:12,cursor:"pointer"}}>📥 Import Data</button>
        </div>
        <div style={{display:"flex",gap:4,marginBottom:14,background:C.deep,borderRadius:10,padding:4}}>
          {[["fert","Fertilizer"],["chem","Chemical"]].map(([k,l])=>(
            <button key={k} onClick={()=>setRecTab(k)} style={{flex:1,padding:"8px 4px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:recTab===k?C.g:"transparent",color:recTab===k?C.bg:C.d}}>{l}</button>
          ))}
        </div>
        {recTab==="fert"&&<>
          <button onClick={()=>{setModal("fertG");setForm({date:new Date().toISOString().slice(0,10),pivot:"P0",side:"Full Circle"});}} style={{width:"100%",background:C.y,color:C.bg,border:"none",borderRadius:10,padding:12,fontWeight:800,fontSize:14,cursor:"pointer",marginBottom:14}}>+ Add Fertilizer Record</button>
          {!fertRecs.length&&<div style={{color:C.d,textAlign:"center",padding:24}}>No records yet</div>}
          {[...fertRecs].sort((a,b)=>new Date(b.date)-new Date(a.date)).map((r,i)=>(
            <div key={i} style={{background:C.card,border:`1px solid ${r.needsIrrigation&&!r.irrigated?"#854d0e":C.cb}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <div style={{fontWeight:700,color:C.y}}>{r.product}</div>
                <div style={{fontSize:11,color:C.d}}>{r.date}</div>
              </div>
              <div style={{fontSize:12,color:C.m}}>{r.pivot} · {r.rate} kg/ha · {r.totalKg} kg · {r.side}</div>
              {r.needsIrrigation&&!r.irrigated&&<div style={{fontSize:11,color:C.o}}>💧 Needs irrigation on {r.side}</div>}
              {r.irrigated&&<div style={{fontSize:11,color:C.g}}>✓ Irrigated</div>}
            </div>
          ))}
        </>}
        {recTab==="chem"&&<>
          <button onClick={()=>{setModal("chemG");setForm({date:new Date().toISOString().slice(0,10),pivot:"P0",type:"Fungicide",lockHrs:"24"});}} style={{width:"100%",background:C.b,color:C.bg,border:"none",borderRadius:10,padding:12,fontWeight:800,fontSize:14,cursor:"pointer",marginBottom:14}}>+ Add Chemical Record</button>
          {!chemRecs.length&&<div style={{color:C.d,textAlign:"center",padding:24}}>No records yet</div>}
          {[...chemRecs].sort((a,b)=>new Date(b.date)-new Date(a.date)).map((r,i)=>(
            <div key={i} style={{background:C.card,border:`1px solid ${C.cb}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <div style={{fontWeight:700,color:C.b}}>{r.product}</div>
                <div style={{fontSize:11,color:C.d}}>{r.date}</div>
              </div>
              <div style={{fontSize:12,color:C.m}}>{r.pivot} · {r.type} · {r.rate}</div>
            </div>
          ))}
        </>}
      </div>
    );
  };

  // ─── SPEED TABLES ────────────────────────────────────────────────────────────
  const Tables=()=>{
    const tbl=SD[tblP];
    return(
      <div style={{paddingBottom:100}}>
        <div style={{overflowX:"auto",marginBottom:12}}>
          <div style={{display:"flex",gap:6,paddingBottom:4}}>
            {PN.map(p=><button key={p} onClick={()=>setTblP(p)} style={{padding:"6px 12px",borderRadius:8,border:tblP===p?"none":`1px solid ${C.cb}`,cursor:"pointer",fontSize:12,fontWeight:600,whiteSpace:"nowrap",background:tblP===p?C.g:C.card,color:tblP===p?C.bg:C.d}}>{p}</button>)}
          </div>
        </div>
        <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.cb}`,overflow:"hidden"}}>
          <div style={{padding:"12px 16px",background:C.deep,borderBottom:`1px solid ${C.cb}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:16,fontWeight:800,color:C.t}}>{tblP}</div>
            <div style={{fontSize:13,fontWeight:700,color:C.b}}>{HA[tblP]} ha</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 60px",background:C.deep,padding:"8px 16px",borderBottom:`1px solid ${C.cb}`}}>
            {["Speed","mm/rev","hrs/rev","Start"].map(h=><div key={h} style={{fontSize:11,color:C.g,fontWeight:700,textTransform:"uppercase",letterSpacing:0.8}}>{h}</div>)}
          </div>
          {SPD.map((spd,i)=>{
            const d=tbl[spd];
            return(
              <div key={spd} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 60px",padding:"9px 16px",borderTop:`1px solid ${C.cb}`,background:i%2===0?C.card:"#0d1f14"}}>
                <div style={{color:C.t,fontWeight:spd===100?700:400}}>{spd}%</div>
                <div style={{color:C.b}}>{d.mm}</div>
                <div style={{color:C.m}}>{d.hrs}</div>
                <button onClick={()=>{setModal("start");setForm({pivotId:tblP,speed:String(spd),mode:"Full Circle",startTime:new Date().toISOString().slice(0,16)});}} style={{background:C.deep,border:`1px solid ${C.cb}`,color:C.g,borderRadius:6,padding:"3px 6px",fontSize:10,cursor:"pointer"}}>▶</button>
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ─── MAP ─────────────────────────────────────────────────────────────────────
  const Map=()=>{
    const [pins,setPinsState]=useState(()=>{
      try{const p=localStorage.getItem("ww_pins");return p?JSON.parse(p):{}}catch(e){return{};}
    });
    const [selPin,setSelPin]=useState("P0");
    const [lat,setLat]=useState("");const [lng,setLng]=useState("");

    const savePin=()=>{
      const la=parseFloat(lat),lo=parseFloat(lng);
      if(isNaN(la)||isNaN(lo)){alert("Enter valid coordinates");return;}
      const np={...pins,[selPin]:{lat:la,lng:lo}};
      setPinsState(np);localStorage.setItem("ww_pins",JSON.stringify(np));
      setLat("");setLng("");
      alert(`✅ ${selPin} pinned at ${la.toFixed(4)}, ${lo.toFixed(4)}`);
    };

    const pinList=Object.entries(pins);
    return(
      <div style={{paddingBottom:100}}>
        <div style={{background:C.deep,border:`1px solid ${C.cb}`,borderRadius:10,padding:12,marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:C.g,marginBottom:8}}>📍 Pinned Pivots ({pinList.length}/13)</div>
          {!pinList.length&&<div style={{color:C.d,fontSize:12}}>No pivots pinned yet</div>}
          {pinList.map(([pid,p])=>{
            const piv=pivots.find(pp=>pp.id===pid);const pr=piv?cp(piv):null;
            return<div key={pid} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${C.cb}`}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:piv?.active?C.g:C.d,display:"inline-block"}}/>
                <span style={{fontWeight:700,color:C.t,fontSize:13}}>{pid}</span>
                <span style={{fontSize:11,color:C.d}}>{piv?.active?`${pr?pr.pct.toFixed(0):0}%`:"Idle"}</span>
              </div>
              <div style={{fontSize:10,color:C.m}}>{p.lat.toFixed(4)}, {p.lng.toFixed(4)}</div>
            </div>;
          })}
        </div>
        <div style={{background:C.deep,border:`1px solid ${C.cb}`,borderRadius:10,padding:12,marginBottom:12}}>
          <div style={{fontSize:12,color:C.m,marginBottom:8}}>Pin a pivot — get coordinates from Google Maps:</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
            <select value={selPin} onChange={e=>setSelPin(e.target.value)} style={{background:C.deep,border:`1px solid ${C.cb}`,borderRadius:8,padding:"8px 10px",color:C.t,fontSize:13}}>
              {PN.map(p=><option key={p}>{p}</option>)}
            </select>
            <input value={lat} onChange={e=>setLat(e.target.value)} placeholder="Latitude e.g. -25.48" style={{background:C.deep,border:`1px solid ${C.cb}`,borderRadius:8,padding:"8px 10px",color:C.t,fontSize:13,boxSizing:"border-box"}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
            <input value={lng} onChange={e=>setLng(e.target.value)} placeholder="Longitude e.g. 30.45" style={{background:C.deep,border:`1px solid ${C.cb}`,borderRadius:8,padding:"8px 10px",color:C.t,fontSize:13,boxSizing:"border-box"}}/>
            <button onClick={savePin} style={{background:C.g,border:"none",borderRadius:8,color:C.bg,fontWeight:700,fontSize:13,cursor:"pointer"}}>📍 Pin It</button>
          </div>
          <div style={{fontSize:11,color:C.d}}>💡 Open Google Maps → find pivot center → long press → copy coordinates</div>
        </div>
        <div style={{background:C.deep,border:`1px solid ${C.cb}`,borderRadius:8,padding:"8px 12px",marginBottom:8}}>
          <div style={{fontSize:12,color:C.g,fontWeight:700}}>🗺 Open Google Maps to find coordinates:</div>
        </div>
        <iframe src="https://maps.google.com/maps?q=-25.5,30.5&z=13&output=embed&t=k" style={{width:"100%",height:"calc(100vh - 420px)",border:"none",borderRadius:10}} loading="lazy"/>
      </div>
    );
  };

  // ─── LAYOUT ──────────────────────────────────────────────────────────────────
  const navItems=[{id:"dashboard",icon:"⬡",l:"Farm"},{id:"map",icon:"🗺",l:"Map"},{id:"planner",icon:"📅",l:"Planner"},{id:"records",icon:"📋",l:"Records"},{id:"tables",icon:"⚡",l:"Tables"}];
  const titles={dashboard:"Waka Waka",map:"Farm Map",planner:"Weekly Planner",records:"Records",tables:"Speed Tables",detail:sel||""};

  return(
    <div style={{background:C.bg,minHeight:"100vh",color:C.t,fontFamily:"'Trebuchet MS',sans-serif",maxWidth:480,margin:"0 auto"}}>
      <div style={{position:"sticky",top:0,zIndex:50,background:C.bg,borderBottom:`1px solid ${C.cb}`,padding:"14px 20px 12px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {page!=="dashboard"&&<button onClick={()=>setPage("dashboard")} style={{background:"none",border:"none",color:C.g,fontSize:22,cursor:"pointer",padding:0,lineHeight:1}}>←</button>}
          <div>
            <div style={{fontSize:page==="dashboard"?22:18,fontWeight:900,color:C.t,fontFamily:"Georgia,serif",letterSpacing:-0.5}}>{titles[page]}</div>
            {page==="dashboard"&&<div style={{fontSize:10,color:"#2d5a3d",textTransform:"uppercase",letterSpacing:2}}>Pivot Tracker</div>}
          </div>
          {page==="dashboard"&&<div style={{marginLeft:"auto",fontSize:11,color:"#2d5a3d"}}>{new Date().toLocaleDateString("en-ZA",{day:"2-digit",month:"short",year:"numeric"})}</div>}
        </div>
      </div>
      <div style={{padding:"16px 16px 0"}}>
        {page==="dashboard"&&<Dashboard/>}
        {page==="detail"&&<Detail/>}
        {page==="records"&&<Records/>}
        {page==="tables"&&<Tables/>}
        {page==="planner"&&<Planner/>}
        {page==="map"&&<Map/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.bg,borderTop:`1px solid ${C.cb}`,display:"flex"}}>
        {navItems.map(n=>(
          <button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,padding:"10px 0",background:"none",border:"none",cursor:"pointer",textAlign:"center"}}>
            <div style={{fontSize:16}}>{n.icon}</div>
            <div style={{fontSize:9,color:page===n.id?C.g:"#4b5563",fontWeight:page===n.id?700:400,textTransform:"uppercase",letterSpacing:0.5}}>{n.l}</div>
          </button>
        ))}
      </div>
      <Modal/><WarnModal/><EditSched/><TankCalc/>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

</script>
</body>
</html>
